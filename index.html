<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Parlay">
<meta name="theme-color" content="#FAF9F7">
<title>Parlay</title>

<script>
const manifestData = {
  name: "UFC Parlay Planner", short_name: "Parlay", start_url: ".", display: "standalone",
  background_color: "#FAF9F7", theme_color: "#FAF9F7",
  icons: [{src:"icon.svg",sizes:"any",type:"image/svg+xml"}]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const link = document.createElement('link');
link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>

<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  /* Claude palette */
  --bg:        #FAF9F7;
  --bg2:       #F3F1ED;
  --bg3:       #EAE7E1;
  --border:    #E2DDD6;
  --border2:   #D4CEC5;
  --text:      #1A1916;
  --text2:     #3D3B37;
  --muted:     #8A8680;
  --muted2:    #B5B0A8;
  /* Accent — Claude's terracotta */
  --accent:    #C96442;
  --accent2:   #DA7756;
  --accent-bg: #FAF0EB;
  --accent-border: #F0D5C8;
  /* Semantic */
  --green:     #2D7D52;
  --green-bg:  #EBF5EF;
  --red:       #C0392B;
  --red-bg:    #FDECEA;

  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
  --radius:   14px;
  --radius-lg: 20px;
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Source Sans 3', -apple-system, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex; flex-direction: column;
  height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  background: var(--bg);
  position: relative;
}

/* ── HEADER ── */
.event-header {
  padding: calc(var(--safe-top) + 6px) 20px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.event-name-row { display: flex; align-items: center; gap: 8px; }
#eventName {
  background: transparent; border: none; outline: none;
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  font-size: 24px; font-weight: 700; letter-spacing: -0.3px;
  flex: 1; min-width: 0;
}
#eventName::placeholder { color: var(--muted2); }
.event-meta { color: var(--muted); font-size: 13px; font-weight: 500; margin-top: 3px; }

/* ── SCREEN ── */
#screen {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  background: var(--bg2);
}

.tab-content { padding: 12px 0 130px; }

/* ── TAB BAR ── */
.tab-bar {
  display: flex;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 6px 0 calc(var(--safe-bot) + 2px);
  flex-shrink: 0;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; background: none; border: none; cursor: pointer;
  padding: 4px 0; position: relative;
  font-family: 'Source Sans 3', sans-serif;
}
.tab-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.tab-icon svg { width: 22px; height: 22px; stroke: var(--muted); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.tab-btn.active .tab-icon svg { stroke: var(--accent); }
.tab-label { font-size: 10px; font-weight: 600; letter-spacing: 0.2px; color: var(--muted); }
.tab-btn.active .tab-label { color: var(--accent); }
.tab-badge {
  position: absolute; top: 1px; right: 14%;
  background: var(--accent); color: #fff;
  border-radius: 10px; min-width: 16px; height: 16px;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* ── SECTION HEADER ── */
.section-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px 8px;
}
.section-title {
  font-family: 'Lora', serif;
  color: var(--text2); font-size: 17px; font-weight: 700;
}
.add-btn {
  background: var(--accent); color: #fff; border: none; border-radius: 100px;
  padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif; letter-spacing: 0.2px;
}
.add-btn:active { opacity: 0.85; transform: scale(0.97); }

/* ── BET CARD ── */
.bet-card {
  display: flex; align-items: center; justify-content: space-between;
  margin: 0 14px 8px;
  background: var(--bg); border-radius: var(--radius);
  padding: 13px 14px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--border2);
  transition: border-left-color 0.15s;
}
.bet-card.in-parlay { border-left-color: var(--accent); }
.bet-name { color: var(--text); font-size: 15px; font-weight: 600; }
.bet-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 12px; }
.odds-pos {
  color: var(--green); font-size: 15px; font-weight: 700;
  font-family: 'Lora', serif; font-style: italic;
}
.odds-neg {
  color: var(--accent); font-size: 15px; font-weight: 700;
  font-family: 'Lora', serif; font-style: italic;
}
.icon-btn {
  background: var(--bg2); color: var(--muted); border: 1px solid var(--border);
  border-radius: 9px; width: 30px; height: 28px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.icon-btn:active { background: var(--bg3); }
.icon-btn.danger { color: var(--red); }

/* ── FORM CARD ── */
.form-card {
  margin: 4px 14px 10px;
  background: var(--bg); border-radius: var(--radius-lg);
  padding: 16px; border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.form-title {
  font-family: 'Lora', serif;
  color: var(--muted); font-size: 13px; font-weight: 600; margin-bottom: 12px;
}
.ios-input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 11px; padding: 12px 14px; color: var(--text);
  font-size: 16px; margin-bottom: 10px; outline: none;
  font-family: 'Source Sans 3', sans-serif; font-weight: 500;
  -webkit-appearance: none; appearance: none;
  transition: border-color 0.15s;
}
.ios-input::placeholder { color: var(--muted2); }
.ios-input:focus { border-color: var(--accent); background: var(--bg); }
.form-btns { display: flex; gap: 8px; }
.cancel-btn {
  flex: 1; background: var(--bg2); color: var(--muted); border: 1px solid var(--border);
  border-radius: 11px; padding: 12px; font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: 'Source Sans 3', sans-serif;
}
.save-btn {
  flex: 2; background: var(--accent); color: #fff; border: none;
  border-radius: 11px; padding: 12px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Source Sans 3', sans-serif;
}
.save-btn:active { opacity: 0.88; }

/* ── PARLAY CARDS ── */
.parlay-card {
  margin: 0 14px 8px; background: var(--bg); border-radius: var(--radius-lg);
  padding: 14px 16px; cursor: pointer;
  border: 1.5px solid var(--border);
  transition: border-color 0.15s;
}
.parlay-card.active {
  border-color: var(--accent);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  margin-bottom: 0;
}
.parlay-top { display: flex; justify-content: space-between; align-items: flex-start; }
.parlay-name { color: var(--text); font-family: 'Lora', serif; font-size: 16px; font-weight: 700; margin-bottom: 2px; }
.parlay-meta { color: var(--muted); font-size: 12px; font-weight: 500; }
.parlay-odds {
  color: var(--accent); font-size: 20px; font-weight: 700;
  font-family: 'Lora', serif; font-style: italic;
}
.del-btn { background: none; border: none; color: var(--muted2); font-size: 16px; cursor: pointer; padding: 0 0 0 10px; }
.parlay-pay-row {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
  padding-top: 10px; border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.pay-label { color: var(--muted); font-size: 12px; font-weight: 500; }

.stake-wrap {
  display: flex; align-items: center;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 9px;
  padding: 0 4px 0 8px; gap: 1px;
  transition: border-color 0.15s;
}
.stake-wrap:focus-within { border-color: var(--accent); }
.stake-dollar { color: var(--muted); font-size: 14px; font-weight: 600; user-select: none; }
.stake-input {
  background: transparent; border: none; border-radius: 0;
  color: var(--text); font-size: 15px; font-weight: 700; padding: 7px 4px 7px 0;
  width: 52px; text-align: left; outline: none;
  font-family: 'Source Sans 3', sans-serif; -webkit-appearance: none;
  -moz-appearance: textfield;
}
.stake-input::-webkit-inner-spin-button,
.stake-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.payout-val { color: var(--text); font-size: 15px; font-weight: 700; flex: 1; text-align: right; }
.profit-val { color: var(--green); font-size: 12px; font-weight: 600; }

/* ── LEG PICKER ── */
.leg-picker {
  margin: 0 14px 10px; background: var(--bg);
  border: 1.5px solid var(--accent); border-top: none;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg); padding: 12px 14px;
}
.leg-picker-title { color: var(--muted2); font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
.leg-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 10px; border-radius: 11px; margin-bottom: 5px;
  background: var(--bg2); cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.1s, border-color 0.1s;
}
.leg-row:active { background: var(--bg3); }
.leg-row.on { background: var(--accent-bg); border-color: var(--accent-border); }
.leg-check {
  width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
}
.leg-check.on { background: var(--accent); color: #fff; }
.leg-check.off { background: var(--bg3); color: var(--muted2); border: 1px solid var(--border); }
.leg-name { flex: 1; color: var(--text2); font-size: 14px; font-weight: 600; }

/* ── LEG BREAKDOWN ── */
.leg-breakdown { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
.lgb-title { color: var(--muted2); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.lgb-row { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
.lgb-num {
  width: 20px; height: 20px; background: var(--bg3); color: var(--muted);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.lgb-info { flex: 1; }
.lgb-name { color: var(--text2); font-size: 13px; font-weight: 600; }
.shared-tag {
  display: inline-block; background: var(--red-bg); color: var(--red);
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px;
  margin-top: 2px; letter-spacing: 0.2px;
}
.unique-tag {
  display: inline-block; background: var(--bg3); color: var(--muted);
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 6px; margin-top: 2px;
}

/* ── COMPARE TABLE ── */
.compare-card {
  margin: 14px 14px 0; background: var(--bg); border-radius: var(--radius-lg);
  padding: 14px 16px; border: 1px solid var(--border);
}
.compare-title {
  font-family: 'Lora', serif;
  color: var(--text2); font-size: 14px; font-weight: 700; margin-bottom: 12px;
}
.compare-row {
  display: flex; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.cmp-name { flex: 2; color: var(--text2); font-size: 13px; font-weight: 600; }
.cmp-legs { flex: 0.5; color: var(--muted); font-size: 12px; text-align: center; }
.cmp-odds { flex: 1; color: var(--accent); font-size: 13px; font-weight: 700; font-style: italic; font-family: 'Lora', serif; text-align: center; }
.cmp-stake { flex: 0.8; color: var(--muted); font-size: 12px; text-align: center; }
.cmp-payout { flex: 1.1; color: var(--green); font-size: 13px; font-weight: 700; text-align: right; }
.compare-hdr-row { display: flex; align-items: center; padding-bottom: 6px; border-bottom: 1px solid var(--border2); margin-bottom: 2px; }
.compare-hdr { font-size: 10px; font-weight: 700; color: var(--muted2); letter-spacing: 0.8px; text-transform: uppercase; }
.compare-totals { display: flex; justify-content: space-between; padding-top: 10px; align-items: center; }
.cmp-total-lbl { color: var(--muted); font-size: 13px; font-weight: 500; }
.cmp-total-val { color: var(--text); font-size: 16px; font-weight: 700; font-family: 'Lora', serif; }

/* ── EXPOSURE ── */
.exp-note { color: var(--muted); font-size: 13px; font-weight: 500; padding: 0 18px 10px; line-height: 1.6; }
.exp-card {
  margin: 0 14px 8px; background: var(--bg); border-radius: var(--radius);
  padding: 13px 14px; border: 1px solid var(--border);
}
.exp-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.exp-bet-name { color: var(--text); font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.exp-risk-amt { font-size: 18px; font-weight: 700; font-family: 'Lora', serif; font-style: italic; }
.exp-risk-lbl { color: var(--muted); font-size: 10px; font-weight: 600; margin-top: 1px; text-align: right; text-transform: uppercase; letter-spacing: 0.5px; }
.exp-none { color: var(--muted2); font-size: 12px; font-weight: 500; }
.exp-parlays { display: flex; flex-wrap: wrap; gap: 6px; }
.exp-tag {
  background: var(--accent-bg); color: var(--text2);
  font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 100px;
  display: flex; align-items: center; gap: 5px;
  border: 1px solid var(--accent-border);
}
.exp-dot { color: var(--accent); font-size: 8px; }
.exp-stake { color: var(--muted); font-size: 11px; }

/* ── RECAP ── */
.recap-note { color: var(--muted); font-size: 13px; font-weight: 500; padding: 0 18px 10px; line-height: 1.6; }
.recap-sub {
  font-family: 'Lora', serif;
  color: var(--text2); font-size: 14px; font-weight: 700;
  padding: 12px 18px 8px;
}
.recap-bet-row {
  display: flex; align-items: center; justify-content: space-between;
  margin: 0 14px 7px; background: var(--bg); border-radius: var(--radius);
  padding: 11px 14px; border: 1px solid var(--border);
}
.recap-bet-name { color: var(--text2); font-size: 14px; font-weight: 600; flex: 1; margin-right: 10px; }
.wl-row { display: flex; gap: 6px; }
.w-btn, .l-btn {
  border: 1px solid var(--border); border-radius: 9px; width: 34px; height: 30px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif; transition: background 0.1s, color 0.1s;
}
.w-btn { background: var(--bg2); color: var(--muted); }
.w-btn.on { background: var(--green-bg); color: var(--green); border-color: #9DD3B0; }
.l-btn { background: var(--bg2); color: var(--muted); }
.l-btn.on { background: var(--red-bg); color: var(--red); border-color: #F0ADA6; }
.recap-parlay-row {
  display: flex; align-items: center; justify-content: space-between;
  margin: 0 14px 7px; background: var(--bg); border-radius: var(--radius);
  padding: 12px 14px; border: 1px solid var(--border);
}
.rp-name { color: var(--text); font-size: 14px; font-weight: 700; font-family: 'Lora', serif; }
.rp-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
.status-win { color: var(--green); font-size: 16px; font-weight: 700; font-family: 'Lora', serif; font-style: italic; }
.status-loss { color: var(--red); font-size: 16px; font-weight: 700; font-family: 'Lora', serif; font-style: italic; }
.status-pend { color: var(--muted2); font-size: 13px; font-weight: 600; }
.save-recap-btn {
  margin: 16px 14px 0; width: calc(100% - 28px); display: block;
  background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
  padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
}
.save-recap-btn:active { opacity: 0.85; }
.archive-card {
  margin: 0 14px 8px; background: var(--bg); border-radius: var(--radius);
  padding: 13px 14px; border: 1px solid var(--border);
}
.archive-name { color: var(--text); font-size: 15px; font-weight: 700; font-family: 'Lora', serif; }
.archive-date { color: var(--muted); font-size: 12px; margin-top: 2px; margin-bottom: 6px; }
.archive-net { font-size: 18px; font-weight: 700; font-family: 'Lora', serif; font-style: italic; }
.pos { color: var(--green); }
.neg { color: var(--red); }
.archive-staked { color: var(--muted); font-size: 13px; }
.new-week-btn {
  margin: 12px 14px 0; width: calc(100% - 28px); display: block;
  background: var(--bg); color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
}

/* ── EMPTY ── */
.empty { text-align: center; padding: 52px 30px; }
.empty-icon { font-size: 42px; margin-bottom: 12px; }
.empty-txt { color: var(--muted2); font-size: 14px; font-weight: 500; line-height: 1.7; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(var(--safe-bot) + 80px); left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--text); color: var(--bg);
  border-radius: 100px; padding: 10px 22px;
  font-size: 14px; font-weight: 600; letter-spacing: 0.2px;
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  z-index: 999; pointer-events: none; white-space: nowrap;
  font-family: 'Source Sans 3', sans-serif;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SYNC INDICATOR ── */
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  transition: background 0.3s;
}
.sync-dot.synced { background: var(--green); }
.sync-dot.saving { background: var(--accent); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
.sync-dot.offline { background: var(--muted2); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── SETTINGS MODAL ── */
.settings-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.settings-card {
  background: var(--bg); border-radius: var(--radius-lg);
  padding: 24px 20px; width: 100%; max-width: 380px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
}
.settings-title {
  font-family: 'Lora', serif; font-size: 18px; font-weight: 700;
  color: var(--text); margin-bottom: 16px;
}
.settings-label {
  color: var(--muted); font-size: 11px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px;
}
.settings-help {
  color: var(--muted); font-size: 12px; line-height: 1.5; margin-top: 8px;
}
.settings-status {
  margin-top: 12px; padding: 10px 12px; border-radius: 10px;
  font-size: 13px; font-weight: 600;
}
.settings-status.ok { background: var(--green-bg); color: var(--green); }
.settings-status.err { background: var(--red-bg); color: var(--red); }
.gear-btn {
  background: none; border: none; cursor: pointer; font-size: 18px;
  color: var(--muted); padding: 0; line-height: 1;
}
.gear-btn:active { color: var(--text); }

.archive-del-btn {
  background: none; border: none; color: var(--muted2); font-size: 14px;
  cursor: pointer; padding: 0 0 0 8px; flex-shrink: 0; line-height: 1;
}
.archive-del-btn:active { color: var(--red); }
.data-io-row {
  display: flex; gap: 8px; margin: 0 14px 10px;
}
.io-btn {
  flex: 1; background: var(--bg); color: var(--text2);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 11px 8px; font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif; text-align: center;
  transition: background 0.1s, border-color 0.1s;
}

}

/* ── CONFIRM CLEAR ── */

  background: var(--red-bg); border: 1px solid #F0ADA6;

}

.confirm-yes:active { opacity: 0.85; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 4px 14px 8px; }
</style>
</head>
<body>
<div id="app">
  <div class="event-header">
    <div class="event-name-row">
      <input id="eventName" type="text" value="" placeholder="Parlay" autocomplete="off" autocorrect="off" spellcheck="false" />
      <span class="sync-dot offline" id="syncDot" title="Sync status"></span>
      <button class="gear-btn" onclick="openSettings()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
    </div>
    <div class="event-meta" id="eventMeta">0 bets · 0 parlays</div>
  </div>

  <div id="screen"></div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="pool" onclick="switchTab('pool')">
      <span class="tab-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></span>
      <span class="tab-label">Bets</span>
      <span class="tab-badge" id="badge-pool" style="display:none"></span>
    </button>
    <button class="tab-btn" data-tab="builder" onclick="switchTab('builder')">
      <span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></span>
      <span class="tab-label">Builder</span>
      <span class="tab-badge" id="badge-builder" style="display:none"></span>
    </button>
    <button class="tab-btn" data-tab="exposure" onclick="switchTab('exposure')">
      <span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
      <span class="tab-label">Exposure</span>
    </button>
    <button class="tab-btn" data-tab="recap" onclick="switchTab('recap')">
      <span class="tab-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
      <span class="tab-label">Recap</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="settingsOverlay" style="display:none"></div>

<script>
// ─── STATE ─────────────────────────────────────────────────────────────────
const STORE_KEY = 'ufc_parlay_v5';
const GH_TOKEN_KEY = 'parlay_gh_token';
const GH_REPO = 'jackdengler/parlay';
const GH_FILE = 'data.json';
let ghSha = null;
let syncStatus = 'offline'; // synced | saving | error | offline

function defaultState() {
  return { eventName:'', bets:[], parlays:[], betResults:{}, weeklyRecaps:[], activeParlayId:null, weekName:'' };
}
let S = defaultState();

function getToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }
function setToken(t) { localStorage.setItem(GH_TOKEN_KEY, t); }

function setSyncStatus(s) {
  syncStatus = s;
  const dot = document.getElementById('syncDot');
  if (dot) { dot.className = 'sync-dot ' + s; }
}

// ─── GITHUB SYNC ──────────────────────────────────────────────────────────
async function ghLoad() {
  const token = getToken();
  if (!token) { setSyncStatus('offline'); return false; }
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.status === 404) { ghSha = null; setSyncStatus('synced'); return true; }
    if (!res.ok) { setSyncStatus('error'); return false; }
    const data = await res.json();
    ghSha = data.sha;
    const content = JSON.parse(atob(data.content));
    S = { ...defaultState(), ...content };
    localStorage.setItem(STORE_KEY, JSON.stringify(S));
    setSyncStatus('synced');
    return true;
  } catch (e) { setSyncStatus('error'); return false; }
}

async function ghSave() {
  const token = getToken();
  if (!token) { setSyncStatus('offline'); return; }
  setSyncStatus('saving');
  try {
    const body = { message: 'sync', content: btoa(unescape(encodeURIComponent(JSON.stringify(S, null, 2)))) };
    if (ghSha) body.sha = ghSha;
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      // sha mismatch — re-fetch and retry once
      if (res.status === 409 || res.status === 422) {
        await ghLoad();
        return ghSave();
      }
      setSyncStatus('error'); return;
    }
    const data = await res.json();
    ghSha = data.content.sha;
    setSyncStatus('synced');
  } catch (e) { setSyncStatus('error'); }
}

let _ghSaveTimer = null;
function debouncedGhSave() {
  clearTimeout(_ghSaveTimer);
  _ghSaveTimer = setTimeout(ghSave, 2000);
}

function loadState() {
  try { const r = localStorage.getItem(STORE_KEY); if (r) S = { ...defaultState(), ...JSON.parse(r) }; } catch (e) {}
}
function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(S)); } catch (e) {}
  debouncedGhSave();
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────
function openSettings() {
  const overlay = document.getElementById('settingsOverlay');
  const token = getToken();
  overlay.innerHTML = `<div class="settings-overlay" onclick="if(event.target===this)closeSettings()">
    <div class="settings-card">
      <div class="settings-title">GitHub Sync</div>
      <div class="settings-label">Personal Access Token</div>
      <input class="ios-input" id="ghTokenInput" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${token ? '••••••••' : ''}" autocomplete="off" onfocus="if(this.value.startsWith('••'))this.value=''" />
      <div class="settings-help">Create a token at GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens. Give it <strong>Contents</strong> read &amp; write access to the <strong>${GH_REPO.split('/')[1]}</strong> repo.</div>
      <div class="form-btns" style="margin-top:16px">
        <button class="cancel-btn" onclick="closeSettings()">Cancel</button>
        <button class="save-btn" onclick="saveToken()">Save</button>
      </div>
      <div id="settingsStatus"></div>
    </div>
  </div>`;
  overlay.style.display = 'block';
}
function closeSettings() {
  document.getElementById('settingsOverlay').style.display = 'none';
}
async function saveToken() {
  const input = document.getElementById('ghTokenInput');
  const val = input.value.trim();
  if (!val || val.startsWith('••')) { closeSettings(); return; }
  setToken(val);
  const statusEl = document.getElementById('settingsStatus');
  statusEl.innerHTML = '<div class="settings-status" style="background:var(--bg2);color:var(--muted)">Testing connection...</div>';
  const ok = await ghLoad();
  if (ok) {
    statusEl.innerHTML = '<div class="settings-status ok">Connected! Syncing with GitHub.</div>';
    render();
    setTimeout(closeSettings, 1200);
  } else {
    statusEl.innerHTML = '<div class="settings-status err">Failed to connect. Check your token and try again.</div>';
  }
}

// ─── HELPERS ───────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9); }
function fmtOdds(o) { return o>0?`+${o}`:`${o}`; }
function oddsToDecimal(o) { return o>0?o/100+1:100/Math.abs(o)+1; }
function parlayDecimal(ids) {
  return ids.reduce((acc,id)=>{ const b=S.bets.find(b=>b.id===id); return b?acc*oddsToDecimal(b.odds):acc; },1);
}
function decToAmerican(d) {
  if(d<=1) return '—';
  if(d>=2) return `+${Math.round((d-1)*100)}`;
  return `${Math.round(-100/(d-1))}`;
}
function calcPayout(ids,stake) { return (parlayDecimal(ids)*stake).toFixed(2); }
function calcProfit(ids,stake) { return ((parlayDecimal(ids)-1)*stake).toFixed(2); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── TABS ──────────────────────────────────────────────────────────────────
let currentTab='pool';
function switchTab(tab) {
  if(tab!=='recap') S._confirmClear=false;
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  renderScreen();
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('eventName').value=S.eventName;
  document.getElementById('eventMeta').textContent=`${S.bets.length} bet${S.bets.length!==1?'s':''} · ${S.parlays.length} parlay${S.parlays.length!==1?'s':''}`;
  const bp=document.getElementById('badge-pool'),bb=document.getElementById('badge-builder');
  if(S.bets.length){bp.textContent=S.bets.length;bp.style.display='flex';}else{bp.style.display='none';}
  if(S.parlays.length){bb.textContent=S.parlays.length;bb.style.display='flex';}else{bb.style.display='none';}
  renderScreen();
}
function renderScreen() {
  const sc=document.getElementById('screen');
  if(currentTab==='pool') sc.innerHTML=renderPool();
  else if(currentTab==='builder') sc.innerHTML=renderBuilder();
  else if(currentTab==='exposure') sc.innerHTML=renderExposure();
  else sc.innerHTML=renderRecap();
  attachHandlers();
}

// ─── POOL ──────────────────────────────────────────────────────────────────
let showBetForm=false, editingBetId=null;

function renderPool() {
  const inParlayIds=new Set(S.parlays.flatMap(p=>p.betIds));
  let html=`<div class="tab-content">
  <div class="section-hdr">
    <span class="section-title">Bet Pool</span>
    <button class="add-btn" onclick="openBetForm()">+ Add bet</button>
  </div>`;

  if(S.bets.length===0&&!showBetForm) {
    html+=`<div class="empty"><div class="empty-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div><div class="empty-txt">No bets yet.<br>Tap + Add bet to get started.</div></div>`;
  }

  S.bets.forEach(b=>{
    const cls=inParlayIds.has(b.id)?'bet-card in-parlay':'bet-card';
    const oc=b.odds>0?'odds-pos':'odds-neg';
    html+=`<div class="${cls}">
      <div class="bet-name">${esc(b.name)}</div>
      <div class="bet-right">
        <span class="${oc}">${fmtOdds(b.odds)}</span>
        <button class="icon-btn" onclick="openEditBet('${b.id}')">✎</button>
        <button class="icon-btn danger" onclick="deleteBet('${b.id}')">✕</button>
      </div>
    </div>`;
  });

  if(showBetForm) {
    const b=editingBetId?S.bets.find(x=>x.id===editingBetId):null;
    const currentOdds=b?b.odds:null;
    const isNeg=currentOdds!==null?currentOdds<0:true; // default to negative (favorite)
    const absVal=currentOdds!==null?Math.abs(currentOdds):'';
    html+=`<div class="form-card">
      <div class="form-title">${b?'Edit bet':'New bet'}</div>
      <input class="ios-input" id="fBetName" type="text" placeholder="Bet name (e.g. Oliveira by Sub)" value="${b?esc(b.name):''}" autocomplete="off" />
      <div class="odds-input-row">
        <button class="odds-sign-btn ${isNeg?'neg':'pos'}" id="oddsSignBtn" onclick="toggleOddsSign()" type="button">${isNeg?'−':'+'}</button>
        <input class="ios-input odds-input" id="fBetOdds" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="180" value="${absVal}" />
      </div>
      <div class="form-btns">
        <button class="cancel-btn" onclick="closeBetForm()">Cancel</button>
        <button class="save-btn" onclick="saveBet()">Save bet</button>
      </div>
    </div>`;
  }
  html+=`</div>`;
  return html;
}

// ─── BUILDER ───────────────────────────────────────────────────────────────
function renderBuilder() {
  let html=`<div class="tab-content">
  <div class="section-hdr">
    <span class="section-title">Parlays</span>
    <button class="add-btn" onclick="createParlay()">+ New parlay</button>
  </div>`;

  if(S.parlays.length===0) {
    html+=`<div class="empty"><div class="empty-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><div class="empty-txt">No parlays yet.<br>Create one to start planning scenarios.</div></div>`;
  }

  S.parlays.forEach(p=>{
    const isActive=S.activeParlayId===p.id;
    const dec=parlayDecimal(p.betIds);
    html+=`<div class="parlay-card ${isActive?'active':''}" onclick="toggleParlay('${p.id}')">
      <div class="parlay-top">
        <div>
          <div class="parlay-name">${esc(p.name)}</div>
          <div class="parlay-meta">${p.betIds.length} leg${p.betIds.length!==1?'s':''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="parlay-odds">${p.betIds.length>0?decToAmerican(dec):'—'}</span>
          <button class="del-btn" onclick="event.stopPropagation();deleteParlay('${p.id}')">✕</button>
        </div>
      </div>`;

    if(p.betIds.length>0) {
      html+=`<div class="parlay-pay-row">
        <span class="pay-label">Stake</span>
        <div class="stake-wrap" onclick="event.stopPropagation()">
          <span class="stake-dollar">$</span>
          <input class="stake-input" type="text" inputmode="decimal" pattern="[0-9]*" value="${p.stake}"
            data-pid="${p.id}"
            data-mult="${parlayDecimal(p.betIds).toFixed(6)}"
            onclick="event.stopPropagation();this.select()"
            oninput="liveStake(this)">
        </div>
        <span class="pay-label">→</span>
        <span class="payout-val" id="pv-${p.id}">$${calcPayout(p.betIds,p.stake)}</span>
        <span class="profit-val" id="pr-${p.id}">+$${calcProfit(p.betIds,p.stake)}</span>
      </div>`;
    }
    html+=`</div>`;

    if(isActive) {
      html+=`<div class="leg-picker">
        <div class="leg-picker-title">Tap to add or remove legs</div>`;
      if(S.bets.length===0) html+=`<div style="color:var(--muted2);font-size:13px;text-align:center;padding:12px">Add bets in the Bets tab first</div>`;
      S.bets.forEach(b=>{
        const on=p.betIds.includes(b.id);
        const oc=b.odds>0?'odds-pos':'odds-neg';
        html+=`<div class="leg-row ${on?'on':''}" onclick="toggleLeg('${p.id}','${b.id}')">
          <div class="leg-check ${on?'on':'off'}">${on?'✓':'+'}</div>
          <span class="leg-name">${esc(b.name)}</span>
          <span class="${oc}">${fmtOdds(b.odds)}</span>
        </div>`;
      });

      if(p.betIds.length>0) {
        html+=`<div class="leg-breakdown"><div class="lgb-title">Leg breakdown</div>`;
        p.betIds.forEach((bid,i)=>{
          const b=S.bets.find(x=>x.id===bid); if(!b) return;
          const sisters=S.parlays.filter(pp=>pp.betIds.includes(bid));
          const oc=b.odds>0?'odds-pos':'odds-neg';
          html+=`<div class="lgb-row">
            <div class="lgb-num">${i+1}</div>
            <div class="lgb-info">
              <div class="lgb-name">${esc(b.name)}</div>
              ${sisters.length>1?`<span class="shared-tag">Shared in ${sisters.length} parlays</span>`:`<span class="unique-tag">Only in this parlay</span>`}
            </div>
            <span class="${oc}">${fmtOdds(b.odds)}</span>
          </div>`;
        });
        html+=`</div>`;
      }
      html+=`</div>`;
    }
  });

  if(S.parlays.length>1) {
    const totalRisk=S.parlays.reduce((s,p)=>s+p.stake,0);
    html+=`<div class="compare-card">
      <div class="compare-title">Scenario Compare</div>
      <div class="compare-hdr-row">
        <span class="compare-hdr cmp-name">Parlay</span>
        <span class="compare-hdr cmp-legs">Legs</span>
        <span class="compare-hdr cmp-odds">Odds</span>
        <span class="compare-hdr cmp-stake">Stake</span>
        <span class="compare-hdr cmp-payout" style="text-align:right">Payout</span>
      </div>`;
    S.parlays.forEach(p=>{
      const dec=parlayDecimal(p.betIds);
      html+=`<div class="compare-row">
        <span class="cmp-name">${esc(p.name)}</span>
        <span class="cmp-legs">${p.betIds.length}</span>
        <span class="cmp-odds">${p.betIds.length?decToAmerican(dec):'—'}</span>
        <span class="cmp-stake">$${p.stake}</span>
        <span class="cmp-payout">${p.betIds.length?'$'+calcPayout(p.betIds,p.stake):'—'}</span>
      </div>`;
    });
    html+=`<div class="compare-totals">
      <span class="cmp-total-lbl">Total at risk</span>
      <span class="cmp-total-val">$${totalRisk.toFixed(2)}</span>
    </div></div>`;
  }

  html+=`</div>`;
  return html;
}

// ─── EXPOSURE ──────────────────────────────────────────────────────────────
function renderExposure() {
  let html=`<div class="tab-content">
  <div class="section-hdr"><span class="section-title">Bet Exposure</span></div>
  <p class="exp-note">If a bet loses, every parlay containing it busts. See how much is riding on each pick.</p>`;

  if(S.bets.length===0) {
    html+=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">Add bets to see your exposure analysis.</div></div>`;
  }

  S.bets.forEach(b=>{
    const inParlays=S.parlays.filter(p=>p.betIds.includes(b.id));
    const atRisk=inParlays.reduce((s,p)=>s+p.stake,0);
    const oc=b.odds>0?'odds-pos':'odds-neg';
    html+=`<div class="exp-card">
      <div class="exp-top">
        <div>
          <div class="exp-bet-name">${esc(b.name)}</div>
          <span class="${oc}">${fmtOdds(b.odds)}</span>
        </div>
        <div style="text-align:right">
          <div class="exp-risk-amt" style="color:${atRisk>0?'var(--red)':'var(--muted2)'}">${atRisk>0?'$'+atRisk:'—'}</div>
          <div class="exp-risk-lbl">at risk</div>
        </div>
      </div>`;
    if(inParlays.length===0) {
      html+=`<div class="exp-none">Not in any parlay</div>`;
    } else {
      html+=`<div class="exp-parlays">`;
      inParlays.forEach(p=>{
        html+=`<div class="exp-tag"><span class="exp-dot">●</span>${esc(p.name)}<span class="exp-stake">$${p.stake}</span></div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div>`;
  return html;
}

// ─── RECAP ─────────────────────────────────────────────────────────────────
function defaultWeekName() {
  return new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function renderRecap() {
  if(!S.weekName) S.weekName = defaultWeekName();
  let html=`<div class="tab-content">
  <div class="section-hdr"><span class="section-title">Week Recap</span></div>
  <div style="padding:0 14px 12px">
    <div style="color:var(--muted);font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px">Week name</div>
    <input class="ios-input" style="margin-bottom:0" id="weekNameInput" type="text" value="${esc(S.weekName)}" placeholder="e.g. UFC 314 · Apr 12" autocomplete="off" oninput="S.weekName=this.value;saveState()" />
  </div>`;

  if(S.bets.length>0) {
    html+=`<div class="recap-sub">Mark bet results</div>`;
    S.bets.forEach(b=>{
      const res=S.betResults[b.id];
      html+=`<div class="recap-bet-row">
        <span class="recap-bet-name">${esc(b.name)}</span>
        <div class="wl-row">
          <button class="w-btn ${res==='win'?'on':''}" onclick="setResult('${b.id}','win')">W</button>
          <button class="l-btn ${res==='loss'?'on':''}" onclick="setResult('${b.id}','loss')">L</button>
        </div>
      </div>`;
    });
  }

  if(S.parlays.length>0) {
    html+=`<div class="recap-sub">Parlay outcomes</div>`;
    S.parlays.forEach(p=>{
      const legRes=p.betIds.map(id=>S.betResults[id]||null);
      const won=legRes.length>0&&legRes.every(r=>r==='win');
      const lost=legRes.some(r=>r==='loss');
      const status=won?'win':lost?'loss':'pending';
      html+=`<div class="recap-parlay-row">
        <div>
          <div class="rp-name">${esc(p.name)}</div>
          <div class="rp-meta">${p.betIds.length} legs · $${p.stake} stake</div>
        </div>
        <div class="${status==='win'?'status-win':status==='loss'?'status-loss':'status-pend'}">
          ${status==='win'?'+$'+calcProfit(p.betIds,p.stake):status==='loss'?'-$'+p.stake:'Pending'}
        </div>
      </div>`;
    });
  }

  if(S.bets.length>0||S.parlays.length>0) {
    html+=`<button class="save-recap-btn" onclick="saveRecap()">Save & archive this week</button>`;
  } else {
    html+=`<div class="empty"><div class="empty-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div class="empty-txt">Add bets and parlays first.</div></div>`;
  }

  if(S.weeklyRecaps.length>0) {
    const allNet=S.weeklyRecaps.reduce((tot,r)=>{
      const wonP=r.parlays.filter(p=>p.result==='win');
      const lostP=r.parlays.filter(p=>p.result==='loss');
      return tot+wonP.reduce((s,p)=>s+(p.payout-p.stake),0)-lostP.reduce((s,p)=>s+p.stake,0);
    },0);
    html+=`<div class="recap-sub" style="display:flex;justify-content:space-between;align-items:center">
      <span>Past weeks</span>
      <span style="font-family:'Lora',serif;font-style:italic;font-size:14px;color:${allNet>=0?'var(--green)':'var(--red)'}">${allNet>=0?'+':''}$${allNet.toFixed(2)} all-time</span>
    </div>`;
    html+=`<div class="data-io-row">
      <button class="io-btn" onclick="exportData()">⬇ Export backup</button>
      <button class="io-btn" onclick="document.getElementById('importDataFile').click()">⬆ Import backup</button>
      <input type="file" id="importDataFile" accept=".json,application/json" style="display:none" onchange="importData(this)">
    </div>`;
    S.weeklyRecaps.forEach(r=>{
      const wonP=r.parlays.filter(p=>p.result==='win');
      const lostP=r.parlays.filter(p=>p.result==='loss');
      const net=wonP.reduce((s,p)=>s+(p.payout-p.stake),0)-lostP.reduce((s,p)=>s+p.stake,0);
      const totalStaked=r.parlays.reduce((s,p)=>s+p.stake,0);
      html+=`<div class="archive-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="archive-name">${esc(r.event)}</div>
            <div class="archive-date">${r.date} · ${r.parlays.length} parlay${r.parlays.length!==1?'s':''}</div>
          </div>
          <button class="archive-del-btn" onclick="deleteRecap('${r.id}')">✕</button>
        </div>
        <div>
          <span class="archive-net ${net>=0?'pos':'neg'}">${net>=0?'+':''}$${net.toFixed(2)}</span>
          <span class="archive-staked"> net · $${totalStaked} staked</span>
        </div>
      </div>`;
    });
  } else {
    html+=`<div class="data-io-row" style="margin-top:8px">
      <button class="io-btn" style="flex:1" onclick="document.getElementById('importDataFile').click()">⬆ Import backup</button>
      <input type="file" id="importDataFile" accept=".json,application/json" style="display:none" onchange="importData(this)">
    </div>`;
  }

  // New week button — always shown if there's anything to clear
  if(S.bets.length>0||S.parlays.length>0) {
    if(S._confirmClear) {
      html+=`<div class="confirm-clear-box">
        <div class="confirm-clear-txt">This will clear all bets and parlays. Past recaps stay saved.</div>
        <div class="confirm-clear-btns">
          <button class="confirm-no" onclick="S._confirmClear=false;render()">Cancel</button>
          <button class="confirm-yes" onclick="newWeek()">Yes, clear everything</button>
        </div>
      </div>`;
    } else {
      html+=`<button class="new-week-btn" onclick="S._confirmClear=true;render()">Start new week — clears bets &amp; parlays</button>`;
    }
  }

  html+=`</div>`;
  return html;
}

// ─── ACTIONS ───────────────────────────────────────────────────────────────
function toggleOddsSign(){
  const btn=document.getElementById('oddsSignBtn');
  if(!btn) return;
  const isNeg=btn.classList.contains('neg');
  btn.classList.toggle('neg',!isNeg);
  btn.classList.toggle('pos',isNeg);
  btn.textContent=isNeg?'+':'−';
}
function openBetForm(){showBetForm=true;editingBetId=null;render();setTimeout(()=>document.getElementById('fBetName')?.focus(),80);}
function closeBetForm(){showBetForm=false;editingBetId=null;render();}
function openEditBet(id){showBetForm=true;editingBetId=id;render();setTimeout(()=>document.getElementById('fBetName')?.focus(),80);}

function saveBet(){
  const name=document.getElementById('fBetName')?.value?.trim();
  const absVal=parseInt(document.getElementById('fBetOdds')?.value);
  const isNeg=document.getElementById('oddsSignBtn')?.classList.contains('neg');
  if(!name||isNaN(absVal)||absVal<=0){showToast('Enter a name and valid odds');return;}
  const odds=isNeg?-absVal:absVal;
  if(editingBetId){S.bets=S.bets.map(b=>b.id===editingBetId?{...b,name,odds}:b);}
  else{S.bets.push({id:uid(),name,odds});}
  showBetForm=false;editingBetId=null;saveState();render();
}
function deleteBet(id){
  S.bets=S.bets.filter(b=>b.id!==id);
  S.parlays=S.parlays.map(p=>({...p,betIds:p.betIds.filter(x=>x!==id)}));
  saveState();render();
}
function openParlayForm(){} // no-op, kept for safety
function closeParlayForm(){render();}
function createParlay(){
  const num=S.parlays.length+1;
  const p={id:uid(),name:`Parlay ${num}`,betIds:[],stake:50};
  S.parlays.push(p);S.activeParlayId=p.id;saveState();render();
}
function toggleParlay(id){S.activeParlayId=S.activeParlayId===id?null:id;saveState();render();}
function deleteParlay(id){
  S.parlays=S.parlays.filter(p=>p.id!==id);
  if(S.activeParlayId===id)S.activeParlayId=null;
  saveState();render();
}
function toggleLeg(pid,bid){
  S.parlays=S.parlays.map(p=>{
    if(p.id!==pid)return p;
    const has=p.betIds.includes(bid);
    return {...p,betIds:has?p.betIds.filter(x=>x!==bid):[...p.betIds,bid]};
  });
  saveState();render();
}
function liveStake(input){
  const pid=input.dataset.pid;
  const mult=parseFloat(input.dataset.mult)||1;
  const n=parseFloat(input.value);
  if(isNaN(n)||n<0) return;
  // Update DOM directly — no re-render needed
  const pv=document.getElementById('pv-'+pid);
  const pr=document.getElementById('pr-'+pid);
  if(pv) pv.textContent='$'+(mult*n).toFixed(2);
  if(pr) pr.textContent='+$'+((mult-1)*n).toFixed(2);
  // Persist debounced
  clearTimeout(liveStake._t);
  liveStake._t=setTimeout(()=>{ setStake(pid,n); },400);
}
function setStake(pid,val){
  const n=parseFloat(val);if(isNaN(n)||n<0)return;
  S.parlays=S.parlays.map(p=>p.id===pid?{...p,stake:n}:p);
  saveState();
}
function setResult(id,result){
  S.betResults[id]=S.betResults[id]===result?null:result;
  saveState();render();
}
function saveRecap(){
  const recap={
    id:uid(),event:S.weekName||S.eventName,
    date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    bets:S.bets.map(b=>({...b,result:S.betResults[b.id]||null})),
    parlays:S.parlays.map(p=>{
      const legRes=p.betIds.map(id=>S.betResults[id]||null);
      const won=legRes.length>0&&legRes.every(r=>r==='win');
      const lost=legRes.some(r=>r==='loss');
      return{...p,result:won?'win':lost?'loss':'pending',payout:parseFloat(calcPayout(p.betIds,p.stake))};
    }),
  };
  S.weeklyRecaps=[recap,...S.weeklyRecaps];
  S.weekName=defaultWeekName(); // reset for next week
  saveState();showToast('Week archived ✓');render();
}
function exportData(){
  const payload={version:1,exported:new Date().toISOString(),weeklyRecaps:S.weeklyRecaps};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`parlay-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup downloaded ✓');
}
function importData(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      const incoming=data.weeklyRecaps||[];
      if(!Array.isArray(incoming)||incoming.length===0){showToast('No recaps found in file');return;}
      // Merge: skip duplicates by id
      const existingIds=new Set(S.weeklyRecaps.map(r=>r.id));
      const newOnes=incoming.filter(r=>!existingIds.has(r.id));
      S.weeklyRecaps=[...S.weeklyRecaps,...newOnes];
      saveState();render();
      showToast(`Imported ${newOnes.length} week${newOnes.length!==1?'s':''} ✓`);
    }catch(err){showToast('Invalid backup file');}
    input.value='';
  };
  reader.readAsText(file);
}
function deleteRecap(id){
  S.weeklyRecaps=S.weeklyRecaps.filter(r=>r.id!==id);
  saveState();render();
}
function newWeek(){
  S.bets=[];S.parlays=[];S.betResults={};S.activeParlayId=null;S._confirmClear=false;
  S.weekName='';
  saveState();render();showToast('New week started ✓');
}

// ─── ATTACH HANDLERS ───────────────────────────────────────────────────────
function attachHandlers(){
  const en=document.getElementById('eventName');
  if(en) en.addEventListener('input',e=>{
    S.eventName=e.target.value;saveState();
    document.getElementById('eventMeta').textContent=`${S.bets.length} bet${S.bets.length!==1?'s':''} · ${S.parlays.length} parlay${S.parlays.length!==1?'s':''}`;
  });
}

// ─── SERVICE WORKER ────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  const swCode=`const CACHE='parlay-v5';
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/'])));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{if(e.request.url.includes('fonts.googleapis')||e.request.url.includes('fonts.gstatic'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>r)));});`;
  const swBlob=new Blob([swCode],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob));
}

// ─── BOOT ──────────────────────────────────────────────────────────────────
loadState();render();
// Try loading from GitHub (async — will re-render when done)
if (getToken()) {
  ghLoad().then(ok => { if (ok) render(); });
}
</script>
