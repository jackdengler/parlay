<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Parlay">
<meta name="theme-color" content="#FAF9F7">
<title>Parlay</title>

<script>
const manifestData = {
  name: "UFC Parlay Planner", short_name: "Parlay", start_url: ".", display: "standalone",
  background_color: "#FAF9F7", theme_color: "#FAF9F7",
  icons: [{src:"icon.svg",sizes:"any",type:"image/svg+xml"}]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const link = document.createElement('link');
link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>

<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  /* Claude palette */
  --bg:        #FAF9F7;
  --bg2:       #F3F1ED;
  --bg3:       #EAE7E1;
  --border:    #E2DDD6;
  --border2:   #D4CEC5;
  --text:      #1A1916;
  --text2:     #3D3B37;
  --muted:     #8A8680;
  --muted2:    #B5B0A8;
  /* Accent — Claude's terracotta */
  --accent:    #C96442;
  --accent2:   #DA7756;
  --accent-bg: #FAF0EB;
  --accent-border: #F0D5C8;
  /* Semantic */
  --green:     #2D7D52;
  --green-bg:  #EBF5EF;
  --red:       #C0392B;
  --red-bg:    #FDECEA;

  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
  --radius:   14px;
  --radius-lg: 20px;
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Source Sans 3', -apple-system, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex; flex-direction: column;
  height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  background: var(--bg);
  position: relative;
}

/* ── HEADER ── */
.event-header {
  padding: calc(var(--safe-top) + 6px) 20px 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.event-name-row { display: flex; align-items: center; gap: 8px; }
.app-logo { display: flex; align-items: center; gap: 9px; flex: 1; min-width: 0; }
.app-wordmark {
  font-family: 'Lora', Georgia, serif;
  font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
  color: var(--text);
}
.event-meta { color: var(--muted2); font-size: 12px; font-weight: 500; margin-top: 2px; }

/* ── SCREEN ── */
#screen {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  background: var(--bg2);
}

.tab-content { padding: 12px 0 130px; }

/* ── TAB BAR ── */
.tab-bar {
  display: flex;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 6px 0 calc(var(--safe-bot) + 2px);
  flex-shrink: 0;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; background: none; border: none; cursor: pointer;
  padding: 4px 0; position: relative;
  font-family: 'Source Sans 3', sans-serif;
}
.tab-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.tab-icon svg { width: 22px; height: 22px; stroke: var(--muted); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.tab-btn.active .tab-icon svg { stroke: var(--accent); }
.tab-label { font-size: 10px; font-weight: 600; letter-spacing: 0.2px; color: var(--muted); }
.tab-btn.active .tab-label { color: var(--accent); }
.tab-badge {
  position: absolute; top: 1px; right: 14%;
  background: var(--accent); color: #fff;
  border-radius: 10px; min-width: 16px; height: 16px;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* ── SECTION HEADER ── */
.section-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px 8px;
}
.section-title {
  font-family: 'Lora', serif;
  color: var(--text2); font-size: 17px; font-weight: 700;
}
.add-btn {
  background: var(--accent); color: #fff; border: none; border-radius: 100px;
  padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif; letter-spacing: 0.2px;
}
.add-btn:active { opacity: 0.85; transform: scale(0.97); }

/* ── BET CARD ── */
.bet-card {
  display: flex; align-items: center; justify-content: space-between;
  margin: 0 14px 8px;
  background: var(--bg); border-radius: var(--radius);
  padding: 13px 14px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--border2);
  transition: border-left-color 0.15s, opacity 0.15s;
}
.bet-card.in-parlay { border-left-color: var(--accent); }
.bet-card.drag-over-top { box-shadow: 0 -2px 0 var(--accent); }
.bet-card.drag-over-bottom { box-shadow: 0 2px 0 var(--accent); }
.drag-handle {
  color: var(--muted2); font-size: 15px; cursor: grab; padding: 0 10px 0 0;
  flex-shrink: 0; touch-action: none; user-select: none; line-height: 1;
}
.drag-handle:active { cursor: grabbing; color: var(--muted); }
.bet-name { color: var(--text); font-size: 15px; font-weight: 600; }
.bet-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 12px; }
.odds-pos {
  color: var(--green); font-size: 15px; font-weight: 700;
  font-family: 'Lora', serif; font-style: italic;
}
.odds-neg {
  color: var(--accent); font-size: 15px; font-weight: 700;
  font-family: 'Lora', serif; font-style: italic;
}
.icon-btn {
  background: var(--bg2); color: var(--muted); border: 1px solid var(--border);
  border-radius: 9px; width: 30px; height: 28px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.icon-btn:active { background: var(--bg3); }
.icon-btn.danger { color: var(--red); }

/* ── SWIPE DELETE ── */
.bet-card[data-id] { will-change: transform; }
.swipe-reveal {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: var(--red); font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
  opacity: 0; pointer-events: none; transition: opacity 0.1s;
}

/* ── GROUP HEADER ── */
.group-hdr {
  padding: 10px 18px 2px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.9px;
  text-transform: uppercase; color: var(--muted);
}
.group-hdr:first-child { padding-top: 0; }

/* ── IMPLIED PROB ── */
.imp-prob {
  font-size: 11px; font-weight: 600; color: var(--muted2);
  font-style: normal; font-family: 'Source Sans 3', sans-serif;
  margin-top: 1px; text-align: right;
}

/* ── PARLAY RENAME ── */
.parlay-rename-input {
  background: var(--bg2); border: 1.5px solid var(--accent); border-radius: 8px;
  padding: 3px 8px; color: var(--text); font-family: 'Lora', serif;
  font-size: 16px; font-weight: 700; outline: none; width: 160px; display: block;
}

/* ── FORM CARD ── */
.form-card {
  margin: 4px 14px 10px;
  background: var(--bg); border-radius: var(--radius-lg);
  padding: 16px; border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.form-title {
  font-family: 'Lora', serif;
  color: var(--muted); font-size: 13px; font-weight: 600; margin-bottom: 12px;
}
.ios-input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 11px; padding: 12px 14px; color: var(--text);
  font-size: 16px; margin-bottom: 10px; outline: none;
  font-family: 'Source Sans 3', sans-serif; font-weight: 500;
  -webkit-appearance: none; appearance: none;
  transition: border-color 0.15s;
}
.ios-input::placeholder { color: var(--muted2); }
.ios-input:focus { border-color: var(--accent); background: var(--bg); }
.form-btns { display: flex; gap: 8px; }
.cancel-btn {
  flex: 1; background: var(--bg2); color: var(--muted); border: 1px solid var(--border);
  border-radius: 11px; padding: 12px; font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: 'Source Sans 3', sans-serif;
}
.save-btn {
  flex: 2; background: var(--accent); color: #fff; border: none;
  border-radius: 11px; padding: 12px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Source Sans 3', sans-serif;
}
.save-btn:active { opacity: 0.88; }

/* ── PARLAY CARDS ── */
.parlay-card {
  margin: 0 14px 8px; background: var(--bg); border-radius: var(--radius-lg);
  padding: 14px 16px; cursor: pointer;
  border: 1.5px solid var(--border);
  transition: border-color 0.15s;
}
.parlay-card.active {
  border-color: var(--accent);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  margin-bottom: 0;
}
.parlay-card.placed { border-color: var(--green); background: var(--green-bg); }
.parlay-card.placed.active { border-color: var(--green); }
.placed-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--green); color: #fff; font-size: 10px; font-weight: 800;
  letter-spacing: 0.6px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 100px; margin-top: 4px;
  font-family: 'Source Sans 3', sans-serif;
}
.place-btn {
  background: var(--green); color: #fff; border: none; border-radius: 9px;
  padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
}
.place-btn:active { opacity: 0.85; }
.unlock-btn {
  background: var(--bg); color: var(--green); border: 1px solid var(--green);
  border-radius: 9px; padding: 7px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: 'Source Sans 3', sans-serif;
}
.place-confirm {
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
}
.place-confirm-txt { color: var(--text2); font-size: 13px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
.place-confirm-btns { display: flex; gap: 8px; }
.place-cancel {
  flex: 1; background: var(--bg2); color: var(--muted); border: 1px solid var(--border);
  border-radius: 9px; padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
}
.place-confirm-yes {
  flex: 2; background: var(--green); color: #fff; border: none;
  border-radius: 9px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
}
.parlay-top { display: flex; justify-content: space-between; align-items: flex-start; }
.parlay-name { color: var(--text); font-family: 'Lora', serif; font-size: 16px; font-weight: 700; margin-bottom: 2px; }
.parlay-meta { color: var(--muted); font-size: 12px; font-weight: 500; }
.parlay-odds {
  color: var(--accent); font-size: 20px; font-weight: 700;
  font-family: 'Lora', serif; font-style: italic;
}
.del-btn { background: none; border: none; color: var(--muted2); font-size: 16px; cursor: pointer; padding: 0 0 0 10px; }
.parlay-pay-row {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
  padding-top: 10px; border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.pay-label { color: var(--muted); font-size: 12px; font-weight: 500; }

.stake-wrap {
  display: flex; align-items: center;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 9px;
  padding: 0 4px 0 8px; gap: 1px;
  transition: border-color 0.15s;
}
.stake-wrap:focus-within { border-color: var(--accent); }
.stake-dollar { color: var(--muted); font-size: 14px; font-weight: 600; user-select: none; }
.stake-input {
  background: transparent; border: none; border-radius: 0;
  color: var(--text); font-size: 15px; font-weight: 700; padding: 7px 4px 7px 0;
  width: 52px; text-align: left; outline: none;
  font-family: 'Source Sans 3', sans-serif; -webkit-appearance: none;
  -moz-appearance: textfield;
}
.stake-input::-webkit-inner-spin-button,
.stake-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.payout-val { color: var(--text); font-size: 15px; font-weight: 700; flex: 1; text-align: right; }
.profit-val { color: var(--green); font-size: 12px; font-weight: 600; }

/* ── LEG PICKER ── */
.leg-picker {
  margin: 0 14px 10px; background: var(--bg);
  border: 1.5px solid var(--accent); border-top: none;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg); padding: 12px 14px;
}
.leg-picker-title { color: var(--muted2); font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
.leg-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 10px; border-radius: 11px; margin-bottom: 5px;
  background: var(--bg2); cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.1s, border-color 0.1s;
}
.leg-row:active { background: var(--bg3); }
.leg-row.on { background: var(--accent-bg); border-color: var(--accent-border); }
.leg-check {
  width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
}
.leg-check.on { background: var(--accent); color: #fff; }
.leg-check.off { background: var(--bg3); color: var(--muted2); border: 1px solid var(--border); }
.leg-name { flex: 1; color: var(--text2); font-size: 14px; font-weight: 600; }

/* ── LEG BREAKDOWN ── */
.leg-breakdown { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
.lgb-title { color: var(--muted2); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.lgb-row { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
.lgb-num {
  width: 20px; height: 20px; background: var(--bg3); color: var(--muted);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.lgb-info { flex: 1; }
.lgb-name { color: var(--text2); font-size: 13px; font-weight: 600; }
.shared-tag {
  display: inline-block; background: var(--red-bg); color: var(--red);
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px;
  margin-top: 2px; letter-spacing: 0.2px;
}
.unique-tag {
  display: inline-block; background: var(--bg3); color: var(--muted);
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 6px; margin-top: 2px;
}

/* ── ROUND ROBIN ── */
.rr-btn {
  width: 100%; padding: 9px 14px; border-radius: var(--radius);
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 6px; justify-content: center;
}
.rr-btn:active { background: var(--border); }
.rr-from { color: var(--muted); font-size: 13px; margin-top: 4px; }
.rr-size-row { display: flex; gap: 8px; flex-wrap: wrap; }
.rr-size-btn {
  flex: 1; min-width: 56px; padding: 10px 6px; border-radius: var(--radius);
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  font-size: 14px; font-weight: 700; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.rr-size-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.rr-size-cnt { font-size: 10px; font-weight: 600; opacity: 0.7; }
.rr-summary {
  background: var(--bg3); border-radius: var(--radius); padding: 10px 14px; margin-top: 8px;
}
.rr-summary-row { display: flex; justify-content: space-between; padding: 4px 0; }
.rr-lbl { color: var(--muted); font-size: 13px; }
.rr-val { color: var(--text); font-size: 13px; font-weight: 600; }

/* ── COMPARE TABLE ── */
.compare-card {
  margin: 14px 14px 0; background: var(--bg); border-radius: var(--radius-lg);
  padding: 14px 16px; border: 1px solid var(--border);
}
.compare-title {
  font-family: 'Lora', serif;
  color: var(--text2); font-size: 14px; font-weight: 700; margin-bottom: 12px;
}
.compare-row {
  display: flex; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.cmp-name { flex: 2; color: var(--text2); font-size: 13px; font-weight: 600; }
.cmp-legs { flex: 0.5; color: var(--muted); font-size: 12px; text-align: center; }
.cmp-odds { flex: 1; color: var(--accent); font-size: 13px; font-weight: 700; font-style: italic; font-family: 'Lora', serif; text-align: center; }
.cmp-stake { flex: 0.8; color: var(--muted); font-size: 12px; text-align: center; }
.cmp-payout { flex: 1.1; color: var(--green); font-size: 13px; font-weight: 700; text-align: right; }
.compare-hdr-row { display: flex; align-items: center; padding-bottom: 6px; border-bottom: 1px solid var(--border2); margin-bottom: 2px; }
.compare-hdr { font-size: 10px; font-weight: 700; color: var(--muted2); letter-spacing: 0.8px; text-transform: uppercase; }
.compare-totals { display: flex; justify-content: space-between; padding-top: 10px; align-items: center; }
.cmp-total-lbl { color: var(--muted); font-size: 13px; font-weight: 500; }
.cmp-total-val { color: var(--text); font-size: 16px; font-weight: 700; font-family: 'Lora', serif; }

/* ── EXPOSURE ── */
.exp-note { color: var(--muted); font-size: 13px; font-weight: 500; padding: 0 18px 10px; line-height: 1.6; }
.exp-card {
  margin: 0 14px 8px; background: var(--bg); border-radius: var(--radius);
  padding: 13px 14px; border: 1px solid var(--border);
}
.exp-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.exp-bet-name { color: var(--text); font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.exp-risk-amt { font-size: 18px; font-weight: 700; font-family: 'Lora', serif; font-style: italic; }
.exp-risk-lbl { color: var(--muted); font-size: 10px; font-weight: 600; margin-top: 1px; text-align: right; text-transform: uppercase; letter-spacing: 0.5px; }
.exp-none { color: var(--muted2); font-size: 12px; font-weight: 500; }
.exp-parlays { display: flex; flex-wrap: wrap; gap: 6px; }
.exp-tag {
  background: var(--accent-bg); color: var(--text2);
  font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 100px;
  display: flex; align-items: center; gap: 5px;
  border: 1px solid var(--accent-border);
}
.exp-dot { color: var(--accent); font-size: 8px; }
.exp-stake { color: var(--muted); font-size: 11px; }
.exp-tag.busted { background: var(--red-bg); border-color: #F0ADA6; color: var(--red); text-decoration: line-through; }
.exp-tag.busted .exp-dot { color: var(--red); font-size: 10px; }
.exp-tag.busted .exp-stake { color: var(--red); opacity: 0.8; }
.exp-tag.won { background: var(--green-bg); border-color: #9DD3B0; color: var(--green); }
.exp-tag.won .exp-dot { color: var(--green); font-size: 10px; }
.exp-tag.won .exp-stake { color: var(--green); opacity: 0.8; }
.exp-tag.push { background: var(--bg3); border-color: var(--border2); color: var(--muted); }
.exp-tag.push .exp-dot { color: var(--muted); font-size: 10px; }

/* ── RECAP ── */
.recap-note { color: var(--muted); font-size: 13px; font-weight: 500; padding: 0 18px 10px; line-height: 1.6; }
.recap-sub {
  font-family: 'Lora', serif;
  color: var(--text2); font-size: 14px; font-weight: 700;
  padding: 12px 18px 8px;
}
.recap-bet-row {
  display: flex; align-items: center; justify-content: space-between;
  margin: 0 14px 7px; background: var(--bg); border-radius: var(--radius);
  padding: 11px 14px; border: 1px solid var(--border);
}
.recap-bet-name { color: var(--text2); font-size: 14px; font-weight: 600; flex: 1; margin-right: 10px; }
.wl-row { display: flex; gap: 6px; }
.w-btn, .l-btn, .p-btn {
  border: 1px solid var(--border); border-radius: 9px; width: 34px; height: 30px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif; transition: background 0.1s, color 0.1s;
}
.w-btn { background: var(--bg2); color: var(--muted); }
.w-btn.on { background: var(--green-bg); color: var(--green); border-color: #9DD3B0; }
.l-btn { background: var(--bg2); color: var(--muted); }
.l-btn.on { background: var(--red-bg); color: var(--red); border-color: #F0ADA6; }

<script>
// ─── STATE ─────────────────────────────────────────────────────────────────
const STORE_KEY = 'ufc_parlay_v5';
const GH_TOKEN_KEY = 'parlay_gh_token';
const GH_REPO = 'jackdengler/parlay';
const GH_FILE = 'data.json';
let ghSha = null;
let syncStatus = 'offline'; // synced | saving | error | offline

function defaultState() {
  return { eventName:'', bets:[], parlays:[], betResults:{}, weeklyRecaps:[], activeParlayId:null, weekName:'' };
}
let S = defaultState();

function getToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }
function setToken(t) { localStorage.setItem(GH_TOKEN_KEY, t); }

function setSyncStatus(s) {
  syncStatus = s;
  const dot = document.getElementById('syncDot');
  if (dot) { dot.className = 'sync-dot ' + s; }
}

// ─── GITHUB SYNC ──────────────────────────────────────────────────────────
async function ghLoad() {
  const token = getToken();
  if (!token) { setSyncStatus('offline'); return false; }
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.status === 404) { ghSha = null; setSyncStatus('synced'); return true; }
    if (!res.ok) { setSyncStatus('error'); return false; }
    const data = await res.json();
    ghSha = data.sha;
    const content = JSON.parse(atob(data.content));
    S = { ...defaultState(), ...content };
    localStorage.setItem(STORE_KEY, JSON.stringify(S));
    setSyncStatus('synced');
    return true;
  } catch (e) { setSyncStatus('error'); return false; }
}

async function ghSave() {
  const token = getToken();
  if (!token) { setSyncStatus('offline'); return; }
  setSyncStatus('saving');
  try {
    const body = { message: 'sync', content: btoa(unescape(encodeURIComponent(JSON.stringify(S, null, 2)))) };
    if (ghSha) body.sha = ghSha;
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      // sha mismatch — re-fetch and retry once
      if (res.status === 409 || res.status === 422) {
        await ghLoad();
        return ghSave();
      }
      setSyncStatus('error'); return;
    }
    const data = await res.json();
    ghSha = data.content.sha;
    setSyncStatus('synced');
  } catch (e) { setSyncStatus('error'); }
}

let _ghSaveTimer = null;
function debouncedGhSave() {
  clearTimeout(_ghSaveTimer);
  _ghSaveTimer = setTimeout(ghSave, 2000);
}

function loadState() {
  try { const r = localStorage.getItem(STORE_KEY); if (r) S = { ...defaultState(), ...JSON.parse(r) }; } catch (e) {}
}
function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(S)); } catch (e) {}
  debouncedGhSave();
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────
function openSettings() {
  const overlay = document.getElementById('settingsOverlay');
  const token = getToken();
  overlay.innerHTML = `<div class="settings-overlay" onclick="if(event.target===this)closeSettings()">
    <div class="settings-card">
      <div class="settings-title">GitHub Sync</div>
      <div class="settings-label">Personal Access Token</div>
      <input class="ios-input" id="ghTokenInput" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${token ? '••••••••' : ''}" autocomplete="off" onfocus="if(this.value.startsWith('••'))this.value=''" />
      <div class="settings-help">Create a token at GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens. Give it <strong>Contents</strong> read &amp; write access to the <strong>${GH_REPO.split('/')[1]}</strong> repo.</div>
      <div class="form-btns" style="margin-top:16px">
        <button class="cancel-btn" onclick="closeSettings()">Cancel</button>
        <button class="save-btn" onclick="saveToken()">Save</button>
      </div>
      <div id="settingsStatus"></div>
    </div>
  </div>`;
  overlay.style.display = 'block';
}
function closeSettings() {
  document.getElementById('settingsOverlay').style.display = 'none';
}
async function saveToken() {
  const input = document.getElementById('ghTokenInput');
  const val = input.value.trim();
  if (!val || val.startsWith('••')) { closeSettings(); return; }
  setToken(val);
  const statusEl = document.getElementById('settingsStatus');
  statusEl.innerHTML = '<div class="settings-status" style="background:var(--bg2);color:var(--muted)">Testing connection...</div>';
  const ok = await ghLoad();
  if (ok) {
    statusEl.innerHTML = '<div class="settings-status ok">Connected! Syncing with GitHub.</div>';
    render();
    setTimeout(closeSettings, 1200);
  } else {
    statusEl.innerHTML = '<div class="settings-status err">Failed to connect. Check your token and try again.</div>';
  }
}

// ─── PASTE IMPORT ───────────────────────────────────────────────────────────
let showPasteForm = false;

function parseBetLines(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  let added = 0, skipped = 0;
  lines.forEach(line => {
    // Last comma-separated token that looks like odds wins
    const parts = line.split(',');
    let name, oddsRaw;
    if (parts.length >= 2) {
      const last = parts[parts.length - 1].trim();
      if (/^[+-]?\d+$/.test(last)) { oddsRaw = last; name = parts.slice(0, -1).join(',').trim(); }
      else { name = parts[0].trim(); oddsRaw = last; }
    } else {
      const m = line.trim().match(/^(.+?)\s+([+-]?\d+)$/);
      if (m) { name = m[1].trim(); oddsRaw = m[2].trim(); }
    }
    const odds = parseInt(oddsRaw);
    if (name && !isNaN(odds) && odds !== 0) { S.bets.push({ id: uid(), name, odds }); added++; }
    else skipped++;
  });
  return { added, skipped };
}

function openPasteForm() { showPasteForm = true; render(); setTimeout(() => document.getElementById('pasteInput')?.focus(), 80); }
function closePasteForm() { showPasteForm = false; render(); }
function submitPaste() {
  const text = document.getElementById('pasteInput')?.value?.trim();
  if (!text) { closePasteForm(); return; }
  const { added, skipped } = parseBetLines(text);
  showPasteForm = false;
  if (added) { haptic(); saveState(); render(); showToast(`Added ${added} bet${added>1?'s':''}${skipped?` · ${skipped} skipped`:''}`); }
  else { showToast('No valid bets found'); render(); }
}

// ─── HELPERS ───────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9); }
function fmtOdds(o) { return o>0?`+${o}`:`${o}`; }
function impliedProb(o) { return o<0?Math.abs(o)/(Math.abs(o)+100)*100:100/(o+100)*100; }
function haptic(p=10) { try{navigator.vibrate(p);}catch(e){} }
function combinations(arr, k) {
  if(k===0) return [[]];
  if(arr.length<k) return [];
  const [first,...rest]=arr;
  const withFirst=combinations(rest,k-1).map(c=>[first,...c]);
  const without=combinations(rest,k);
  return [...withFirst,...without];
}
function oddsToDecimal(o) { return o>0?o/100+1:100/Math.abs(o)+1; }
function parlayDecimal(ids) {
  return ids.reduce((acc,id)=>{ const b=S.bets.find(b=>b.id===id); return b?acc*oddsToDecimal(b.odds):acc; },1);
}
function decToAmerican(d) {
  if(d<=1) return '—';
  if(d>=2) return `+${Math.round((d-1)*100)}`;
  return `${Math.round(-100/(d-1))}`;
}
function calcPayout(ids,stake) { return (parlayDecimal(ids)*stake).toFixed(2); }
function calcProfit(ids,stake) { return ((parlayDecimal(ids)-1)*stake).toFixed(2); }
// Effective decimal: pushed legs drop out of the parlay
function effectiveDecimal(ids) {
  return ids.reduce((acc,id)=>{
    const b=S.bets.find(x=>x.id===id);
    if(!b) return acc;
    if(S.betResults[id]==='push') return acc;
    return acc*oddsToDecimal(b.odds);
  },1);
}
function parlayStatus(p) {
  const results=p.betIds.map(id=>S.betResults[id]||null);
  if(results.some(r=>r==='loss')) return 'loss';
  if(results.length>0 && results.every(r=>r==='win'||r==='push')) {
    return results.every(r=>r==='push')?'push':'win';
  }
  return 'pending';
}
function effectiveProfit(p) {
  const status=parlayStatus(p);
  if(status==='win') return (effectiveDecimal(p.betIds)-1)*p.stake;
  if(status==='loss') return -p.stake;
  if(status==='push') return 0;
  return null;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── EXPOSURE ──────────────────────────────────────────────────────────────
function renderExposure() {
  let html=`<div class="tab-content">
  <div class="section-hdr"><span class="section-title">Bet Exposure</span></div>
  <p class="exp-note">If a bet loses, every parlay containing it busts. See how much is riding on each pick.</p>`;

  if(S.bets.length===0) {
    html+=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">Add bets to see your exposure analysis.</div></div>`;
  }

  S.bets.forEach(b=>{
    const inParlays=S.parlays.filter(p=>p.betIds.includes(b.id));
    const betResult=S.betResults[b.id]||null;
    // Classify each parlay by current status so a pending bet in an already-busted parlay
    // doesn't still count as "at risk".
    let liveAtRisk=0, bustedStake=0, wonStake=0, pushStake=0;
    inParlays.forEach(p=>{
      const st=parlayStatus(p);
      if(st==='loss') bustedStake+=p.stake;
      else if(st==='win') wonStake+=p.stake;
      else if(st==='push') pushStake+=p.stake;
      else liveAtRisk+=p.stake;
    });
    const oc=b.odds>0?'odds-pos':'odds-neg';
    let rightBlock;
    if(betResult==='win') {
      rightBlock=`<div class="exp-risk-amt" style="color:var(--green)">Covered</div><div class="exp-risk-lbl">won</div>`;
    } else if(betResult==='loss') {
      rightBlock=`<div class="exp-risk-amt" style="color:var(--red)">-$${bustedStake}</div><div class="exp-risk-lbl">lost</div>`;
    } else if(betResult==='push') {
      const subLbl=liveAtRisk>0?`$${liveAtRisk} live on others`:bustedStake>0?`parlay${inParlays.length>1?'s':''} busted`:'voided';
      rightBlock=`<div class="exp-risk-amt" style="color:var(--muted2)">Push</div><div class="exp-risk-lbl">${subLbl}</div>`;
    } else {
      // Pending bet
      if(liveAtRisk===0 && bustedStake>0) {
        rightBlock=`<div class="exp-risk-amt" style="color:var(--muted2)">$0</div><div class="exp-risk-lbl">parlay${inParlays.length>1?'s':''} busted</div>`;
      } else if(bustedStake>0) {
        rightBlock=`<div class="exp-risk-amt" style="color:var(--red)">$${liveAtRisk}</div><div class="exp-risk-lbl">at risk · $${bustedStake} busted</div>`;
      } else {
        rightBlock=`<div class="exp-risk-amt" style="color:${liveAtRisk>0?'var(--red)':'var(--muted2)'}">${liveAtRisk>0?'$'+liveAtRisk:'—'}</div><div class="exp-risk-lbl">at risk</div>`;
      }
    }
    html+=`<div class="exp-card">
      <div class="exp-top">
        <div>
          <div class="exp-bet-name">${esc(b.name)}</div>
          <span class="${oc}">${fmtOdds(b.odds)}</span>
        </div>
        <div style="text-align:right">${rightBlock}</div>
      </div>`;
    if(inParlays.length===0) {
      html+=`<div class="exp-none">Not in any parlay</div>`;
    } else {
      html+=`<div class="exp-parlays">`;
      inParlays.forEach(p=>{
        const st=parlayStatus(p);
        const tagCls='exp-tag'+(st==='loss'?' busted':st==='win'?' won':st==='push'?' push':'');
        const icon=st==='loss'?'✕':st==='win'?'✓':st==='push'?'=':'●';
        html+=`<div class="${tagCls}"><span class="exp-dot">${icon}</span>${esc(p.name)}<span class="exp-stake">$${p.stake}</span></div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div>`;
  return html;
}

    html+=`<div class="recap-sub">Parlay outcomes</div>`;
    S.parlays.forEach(p=>{
      const status=parlayStatus(p);
      // Sort legs: colored (win/loss/push) first, then pending
      const sortedLegs=[...p.betIds].sort((a,b)=>{
        const ra=S.betResults[a]||null, rb=S.betResults[b]||null;
        if(ra&&!rb) return -1; if(!ra&&rb) return 1; return 0;
      });
      // Max P/L: if remaining pending legs all win vs current state
      const decided=p.betIds.filter(id=>S.betResults[id]);
      const pending=p.betIds.filter(id=>!S.betResults[id]);
      const alreadyLost=decided.some(id=>S.betResults[id]==='loss');
      let plLine='';
      if(status==='pending'&&decided.length>0) {
        if(alreadyLost) {
          plLine=`<div class="rp-maxpl loss">Busted</div>`;
        } else {
          // Best case: pushed legs drop, remaining pending all win
          const maxPay=((effectiveDecimal(p.betIds)*p.betIds.filter(id=>!S.betResults[id]).reduce((acc,id)=>{const b=S.bets.find(x=>x.id===id);return b?acc*oddsToDecimal(b.odds):acc;},1))-1)*p.stake;
          plLine=`<div class="rp-maxpl">Best: +$${maxPay.toFixed(2)}</div>`;
        }
      }
      const isExpanded=expandedResultParlayId===p.id;
      html+=`<div class="recap-parlay-card ${isExpanded?'expanded':''}">
        <div class="recap-parlay-row" onclick="toggleResultParlay('${p.id}')">
          <div style="flex:1;min-width:0">
            <div class="rp-name">${esc(p.name)}</div>
            <div class="rp-meta">${p.betIds.length} legs · $${p.stake} stake</div>
            <div class="leg-dots">${sortedLegs.map(id=>{
              const r=S.betResults[id]||null;
              const b=S.bets.find(x=>x.id===id);
              const cls=r==='win'?'leg-dot win':r==='loss'?'leg-dot loss':r==='push'?'leg-dot push':'leg-dot pend';
              return `<span class="${cls}" title="${b?esc(b.name):''}"></span>`;
            }).join('')}</div>
            ${plLine}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="${status==='win'?'status-win':status==='loss'?'status-loss':status==='push'?'status-push':'status-pend'}">
              ${status==='win'?'+$'+((effectiveDecimal(p.betIds)-1)*p.stake).toFixed(2):status==='loss'?'-$'+p.stake:status==='push'?'Push':'Pending'}
            </div>
            <span class="rp-chevron">${isExpanded?'▲':'▼'}</span>
          </div>
        </div>
        ${isExpanded?`<div class="rp-legs">
          ${p.betIds.map(id=>{
            const b=S.bets.find(x=>x.id===id);
            if(!b) return '';
            const r=S.betResults[id]||null;
            const imp=impliedProb(b.odds).toFixed(0);
            const oc=b.odds>0?'odds-pos':'odds-neg';
            const icon=r==='win'?'<span class="rpl-icon win">✓</span>':r==='loss'?'<span class="rpl-icon loss">✕</span>':r==='push'?'<span class="rpl-icon push">=</span>':'<span class="rpl-icon pend">·</span>';
            const prob=r?'':`<span class="rpl-prob">${imp}% implied</span>`;
            return `<div class="rpl-row ${r||''}">
              ${icon}
              <div class="rpl-info">
                <span class="rpl-name">${esc(b.name)}</span>
                ${prob}
              </div>
              <span class="${oc}">${fmtOdds(b.odds)}</span>
            </div>`;
          }).join('')}
          ${(()=>{
            const liveBets=p.betIds.filter(id=>!S.betResults[id]).map(id=>S.bets.find(x=>x.id===id)).filter(Boolean);
            if(liveBets.length<2||alreadyLost) return '';
            const combinedProb=liveBets.reduce((acc,b)=>acc*(impliedProb(b.odds)/100),1)*100;
            return `<div class="rpl-combined">All ${liveBets.length} remaining hit: <strong>${combinedProb.toFixed(1)}%</strong></div>`;
          })()}
        </div>`:''}
      </div>`;
    });

    // Week summary card
    let totalStaked=0, realizedPL=0, bestCasePL=0;
    S.parlays.forEach(p=>{
      totalStaked+=p.stake;
      const status=parlayStatus(p);
      if(status==='win') {
        const profit=(effectiveDecimal(p.betIds)-1)*p.stake;
        realizedPL+=profit; bestCasePL+=profit;
      } else if(status==='loss') { realizedPL-=p.stake; bestCasePL-=p.stake; }
      else if(status==='push') { /* stake returned, 0 P/L */ }
      else {
        // Still pending — not yet lost stake
        const alreadyLost=p.betIds.some(id=>S.betResults[id]==='loss');
        if(alreadyLost) { bestCasePL-=p.stake; }
        else {
          // Best case: pushes drop out, remaining pending all win
          const bestDec=p.betIds.reduce((acc,id)=>{
            if(S.betResults[id]==='push') return acc;
            const b=S.bets.find(x=>x.id===id); return b?acc*oddsToDecimal(b.odds):acc;
          },1);
          bestCasePL+=(bestDec-1)*p.stake;
        }
      }
    });
    const plColor=realizedPL>0?'var(--green)':realizedPL<0?'var(--red)':'var(--muted)';
    const bestColor=bestCasePL>0?'var(--green)':bestCasePL<0?'var(--red)':'var(--muted)';
    const plSign=realizedPL>0?'+':realizedPL<0?'-':''; const bestSign=bestCasePL>0?'+':bestCasePL<0?'-':'';
    const covered=realizedPL>=totalStaked;
    html+=`<div class="week-summary-card">
      <div class="week-summary-title">Week Summary</div>
      <div class="week-summary-row"><span class="ws-lbl">Total exposure</span><span class="ws-val">${covered?'<span class="ws-covered">Covered</span>':''}$${totalStaked.toFixed(2)}</span></div>
      <div class="week-summary-row"><span class="ws-lbl">Locked P/L</span><span class="ws-val" style="color:${plColor}">${plSign}$${Math.abs(realizedPL).toFixed(2)}</span></div>
      <div class="week-summary-row"><span class="ws-lbl">Best case</span><span class="ws-val" style="color:${bestColor}">${bestSign}$${Math.abs(bestCasePL).toFixed(2)}</span></div>
    </div>`;
  }

  if(S.bets.length>0||S.parlays.length>0) {
    html+=`<button class="save-recap-btn" onclick="saveRecap()">Save & archive this week</button>`;

    // New week / clear button
    if(S._confirmClear) {
      html+=`<div class="confirm-clear-box">
        <div class="confirm-clear-txt">This will clear all bets and parlays. Past recaps stay saved.</div>
        <div class="confirm-clear-btns">
          <button class="confirm-no" onclick="S._confirmClear=false;render()">Cancel</button>
          <button class="confirm-yes" onclick="newWeek()">Yes, clear everything</button>
        </div>
      </div>`;
    } else {
      html+=`<button class="new-week-btn" onclick="S._confirmClear=true;render()">Start new week</button>`;
    }
  } else {
    html+=`<div class="empty"><div class="empty-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div class="empty-txt">No bets yet.<br>Add bets first, then mark results here.</div></div>`;
  }

  html+=`</div>`;
  return html;
}

// ─── HISTORY / RECAP TAB ────────────────────────────────────────────────
let selectedRecapIdx = -1; // -1 = All Time

function recapNet(r) {
  const wonP=r.parlays.filter(p=>p.result==='win');
  const lostP=r.parlays.filter(p=>p.result==='loss');
  // Pushes net $0 — stake returned
  return wonP.reduce((s,p)=>s+(p.payout-p.stake),0)-lostP.reduce((s,p)=>s+p.stake,0);
}
function recapStaked(r) { return r.parlays.reduce((s,p)=>s+p.stake,0); }
function recapWon(r) { return r.parlays.filter(p=>p.result==='win').reduce((s,p)=>s+p.payout,0); }

function selectRecap(idx) { selectedRecapIdx=idx; render(); }

function renderRecap() {
  let html=`<div class="tab-content">
  <div class="section-hdr"><span class="section-title">History</span></div>`;

  if(S.weeklyRecaps.length===0) {
    html+=`<div class="empty"><div class="empty-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg></div><div class="empty-txt">No history yet.<br>Archive a week from the Results tab to see stats here.</div></div>`;
    html+=`</div>`;
    return html;
  }

  // Clamp selection
  if(selectedRecapIdx >= S.weeklyRecaps.length) selectedRecapIdx = -1;

  // Week selector pills
  html+=`<div class="week-selector">
    <button class="week-pill ${selectedRecapIdx===-1?'active':''}" onclick="selectRecap(-1)">All Time</button>`;
  S.weeklyRecaps.forEach((r,i)=>{
    html+=`<button class="week-pill ${selectedRecapIdx===i?'active':''}" onclick="selectRecap(${i})">${esc(r.event||r.date)}</button>`;
  });
  html+=`</div>`;

  // Compute stats for selection
  let totalStaked=0, totalWon=0, totalNet=0, winCount=0, totalParlays=0;
  if(selectedRecapIdx===-1) {
    S.weeklyRecaps.forEach(r=>{
      totalStaked+=recapStaked(r);
      totalWon+=recapWon(r);
      totalNet+=recapNet(r);
      winCount+=r.parlays.filter(p=>p.result==='win').length;
      totalParlays+=r.parlays.length;
    });
  } else {
    const r=S.weeklyRecaps[selectedRecapIdx];
    totalStaked=recapStaked(r);
    totalWon=recapWon(r);
    totalNet=recapNet(r);
    winCount=r.parlays.filter(p=>p.result==='win').length;
    totalParlays=r.parlays.length;
  }
  const winRate=totalParlays>0?Math.round(winCount/totalParlays*100):0;

  // Stats grid
  html+=`<div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" style="color:${totalNet>=0?'var(--green)':'var(--red)'}">${totalNet>=0?'+':''}$${totalNet.toFixed(2)}</div>
      <div class="stat-label">Net P/L</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--text)">$${totalStaked.toFixed(2)}</div>
      <div class="stat-label">Staked</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--green)">$${totalWon.toFixed(2)}</div>
      <div class="stat-label">Won</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--accent)">${winRate}%</div>
      <div class="stat-label">${winCount}/${totalParlays} parlays</div>
    </div>
  </div>`;

  // Bar chart (All Time view)
  if(selectedRecapIdx===-1 && S.weeklyRecaps.length>1) {
    html+=`<div class="recap-sub">Performance by event</div>`;
    const maxAbs=Math.max(...S.weeklyRecaps.map(r=>Math.abs(recapNet(r))),1);
    html+=`<div class="bar-chart">`;
    S.weeklyRecaps.forEach((r,i)=>{
      const net=recapNet(r);
      const pct=Math.max(Math.abs(net)/maxAbs*100,8);
      html+=`<div class="bar-row" onclick="selectRecap(${i})" style="cursor:pointer">
        <div class="bar-label">${esc(r.event||r.date)}</div>
        <div class="bar-track">
          <div class="bar-fill ${net>=0?'pos':'neg'}" style="width:${pct.toFixed(1)}%">${net>=0?'+':''}$${net.toFixed(2)}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  // Week detail (specific week selected)
  if(selectedRecapIdx>=0) {
    const r=S.weeklyRecaps[selectedRecapIdx];

    if(r.bets && r.bets.length>0) {
      html+=`<div class="recap-sub">Bets</div>`;
      html+=`<div class="detail-card">`;
      r.bets.forEach(b=>{
        const rc=b.result==='win'?'detail-result-win':b.result==='loss'?'detail-result-loss':b.result==='push'?'detail-result-push':'detail-result-pend';
        const rl=b.result==='win'?'Win':b.result==='loss'?'Loss':b.result==='push'?'Push':'--';
        html+=`<div class="detail-bet-row">
          <span class="detail-bet-name">${esc(b.name)}</span>
          <span class="${rc}">${rl}</span>
        </div>`;
      });
      html+=`</div>`;
    }

    if(r.parlays && r.parlays.length>0) {
      html+=`<div class="recap-sub">Parlays</div>`;
      r.parlays.forEach(p=>{
        const net=p.result==='win'?(p.payout-p.stake):p.result==='loss'?-p.stake:0;
        html+=`<div class="recap-parlay-row">
          <div>
            <div class="rp-name">${esc(p.name)}</div>
            <div class="rp-meta">${(p.betIds||[]).length} legs · $${p.stake} stake</div>
          </div>
          <div class="${p.result==='win'?'status-win':p.result==='loss'?'status-loss':p.result==='push'?'status-push':'status-pend'}">
            ${p.result==='win'?'+$'+(p.payout-p.stake).toFixed(2):p.result==='loss'?'-$'+p.stake:p.result==='push'?'Push':'Pending'}
          </div>
        </div>`;
      });
    }

    // Delete this recap
    html+=`<button class="new-week-btn" style="color:var(--red);border-color:var(--red-bg)" onclick="deleteRecap('${r.id}')">Delete this event</button>`;
  }

  html+=`</div>`;
  return html;
}

// ─── ACTIONS ───────────────────────────────────────────────────────────────
function toggleOddsSign(){
  const btn=document.getElementById('oddsSignBtn');
  if(!btn) return;
  const isNeg=btn.classList.contains('neg');
  btn.classList.toggle('neg',!isNeg);
  btn.classList.toggle('pos',isNeg);
  btn.textContent=isNeg?'+':'−';
}
function openBetForm(){showBetForm=true;editingBetId=null;render();setTimeout(()=>document.getElementById('fBetName')?.focus(),80);}
function closeBetForm(){showBetForm=false;editingBetId=null;render();}
function openEditBet(id){showBetForm=true;editingBetId=id;render();setTimeout(()=>document.getElementById('fBetName')?.focus(),80);}

function saveBet(){
  const name=document.getElementById('fBetName')?.value?.trim();
  const absVal=parseInt(document.getElementById('fBetOdds')?.value);
  const isNeg=document.getElementById('oddsSignBtn')?.classList.contains('neg');
  if(!name||isNaN(absVal)||absVal<=0){showToast('Enter a name and valid odds');return;}
  const odds=isNeg?-absVal:absVal;
  const group=document.getElementById('fBetGroup')?.value?.trim()||'';
  if(editingBetId){S.bets=S.bets.map(b=>b.id===editingBetId?{...b,name,odds,group}:b);}
  else{S.bets.push({id:uid(),name,odds,group});}
  haptic();showBetForm=false;editingBetId=null;saveState();render();
}
function deleteBet(id){
  haptic([8,40,8]);
  S.bets=S.bets.filter(b=>b.id!==id);
  S.parlays=S.parlays.map(p=>({...p,betIds:p.betIds.filter(x=>x!==id)}));
  saveState();render();
}
function openParlayForm(){} // no-op, kept for safety
function closeParlayForm(){render();}
function createParlay(){
  const num=S.parlays.length+1;
  const p={id:uid(),name:`Parlay ${num}`,betIds:[],stake:50};
  S.parlays.push(p);S.activeParlayId=p.id;saveState();render();
}
function toggleParlay(id){S.activeParlayId=S.activeParlayId===id?null:id;saveState();render();}
function deleteParlay(id){
  const p=S.parlays.find(x=>x.id===id);
  if(p&&p.placed){ showToast('Unlock parlay before deleting'); return; }
  S.parlays=S.parlays.filter(p=>p.id!==id);
  if(S.activeParlayId===id)S.activeParlayId=null;
  saveState();render();
}
function toggleLeg(pid,bid){
  const p=S.parlays.find(x=>x.id===pid);
  if(p&&p.placed){ showToast('Parlay is placed — unlock to edit'); return; }
  S.parlays=S.parlays.map(p=>{
    if(p.id!==pid)return p;
    const has=p.betIds.includes(bid);
    return {...p,betIds:has?p.betIds.filter(x=>x!==bid):[...p.betIds,bid]};
  });
  saveState();render();
}
function liveStake(input){
  const pid=input.dataset.pid;
  const p=S.parlays.find(x=>x.id===pid);
  if(p&&p.placed) return;
  const mult=parseFloat(input.dataset.mult)||1;
  const n=parseFloat(input.value);
  if(isNaN(n)||n<0) return;
  // Update DOM directly — no re-render needed
  const pv=document.getElementById('pv-'+pid);
  const pr=document.getElementById('pr-'+pid);
  if(pv) pv.textContent='$'+(mult*n).toFixed(2);
  if(pr) pr.textContent='+$'+((mult-1)*n).toFixed(2);
  // Persist debounced
  clearTimeout(liveStake._t);
  liveStake._t=setTimeout(()=>{ setStake(pid,n); },400);
}
function setStake(pid,val){
  const p=S.parlays.find(x=>x.id===pid);
  if(p&&p.placed) return;
  const n=parseFloat(val);if(isNaN(n)||n<0)return;
  S.parlays=S.parlays.map(p=>p.id===pid?{...p,stake:n}:p);
  saveState();
}
function requestPlaceParlay(id){
  const p=S.parlays.find(x=>x.id===id);
  if(!p||p.betIds.length===0){ showToast('Add legs first'); return; }
  confirmPlaceParlayId=id; render();
}
function cancelPlaceParlay(){ confirmPlaceParlayId=null; render(); }
function confirmPlaceParlay(id){
  S.parlays=S.parlays.map(p=>p.id===id?{...p,placed:true,placedAt:Date.now()}:p);
  confirmPlaceParlayId=null;
  haptic(); saveState(); render(); showToast('Parlay placed ✓');
}
function unlockParlay(id){
  S.parlays=S.parlays.map(p=>p.id===id?{...p,placed:false,placedAt:null}:p);
  saveState(); render(); showToast('Parlay unlocked');
}
// ─── ROUND ROBIN ────────────────────────────────────────────────────────────
let rrParlayId=null, rrSize=2, rrStake=10;
function openRoundRobin(pid){
  const p=S.parlays.find(x=>x.id===pid);
  if(!p||p.betIds.length<3) return;
  if(p.placed){ showToast('Unlock parlay to run round robin'); return; }
  rrParlayId=pid; rrSize=2; rrStake=p.stake||10;
  renderRROverlay();
  document.getElementById('rrOverlay').style.display='block';
}
function closeRR(){ document.getElementById('rrOverlay').style.display='none'; rrParlayId=null; }
function setRRSize(k){ rrSize=k; renderRROverlay(); }
function setRRStake(val){ const n=parseFloat(val); if(!isNaN(n)&&n>=0) rrStake=n; renderRROverlay(); }
function renderRROverlay(){
  const p=S.parlays.find(x=>x.id===rrParlayId); if(!p) return;
  const n=p.betIds.length;
  const combos=combinations(p.betIds,rrSize);
  const totalRisk=rrStake*combos.length;
  let sizeButtons='';
  for(let k=2;k<n;k++){
    const cnt=combinations(p.betIds,k).length;
    sizeButtons+=`<button class="rr-size-btn ${rrSize===k?'active':''}" onclick="event.stopPropagation();setRRSize(${k})">${k}s<span class="rr-size-cnt">${cnt}</span></button>`;
  }
  // Preview best/worst payouts
  let minPay=Infinity, maxPay=0;
  combos.forEach(c=>{
    const pay=parlayDecimal(c)*rrStake;
    if(pay<minPay) minPay=pay;
    if(pay>maxPay) maxPay=pay;
  });
  const overlay=document.getElementById('rrOverlay');
  overlay.innerHTML=`<div class="settings-overlay" onclick="if(event.target===this)closeRR()">
    <div class="settings-card">
      <div class="settings-title">Round Robin</div>
      <div class="rr-from">from ${esc(p.name)} · ${n} legs</div>
      <div class="settings-label" style="margin-top:14px">Sub-parlay size</div>
      <div class="rr-size-row">${sizeButtons}</div>
      <div class="settings-label" style="margin-top:14px">Stake per parlay</div>
      <div class="stake-wrap" style="margin-bottom:8px">
        <span class="stake-dollar">$</span>
        <input class="stake-input" type="text" inputmode="decimal" pattern="[0-9]*" value="${rrStake}" oninput="setRRStake(this.value)" onclick="this.select()" />
      </div>
      <div class="rr-summary">
        <div class="rr-summary-row"><span class="rr-lbl">Parlays</span><span class="rr-val">${combos.length}</span></div>
        <div class="rr-summary-row"><span class="rr-lbl">Total risk</span><span class="rr-val">$${totalRisk.toFixed(2)}</span></div>
        <div class="rr-summary-row"><span class="rr-lbl">Payout range</span><span class="rr-val">$${minPay.toFixed(2)} – $${maxPay.toFixed(2)}</span></div>
      </div>
      <div class="form-btns" style="margin-top:16px">
        <button class="cancel-btn" onclick="closeRR()">Cancel</button>
        <button class="save-btn" onclick="generateRR()">Generate ${combos.length} parlays</button>
      </div>
    </div>
  </div>`;
}
function generateRR(){
  const p=S.parlays.find(x=>x.id===rrParlayId); if(!p) return;
  const combos=combinations(p.betIds,rrSize);
  const baseName=p.name||'RR';
  combos.forEach((c,i)=>{
    S.parlays.push({id:uid(),name:`${baseName} ${rrSize}s ${i+1}/${combos.length}`,betIds:[...c],stake:rrStake});
  });
  // Remove original parlay
  S.parlays=S.parlays.filter(x=>x.id!==rrParlayId);
  S.activeParlayId=null;
  haptic();closeRR();saveState();render();
  showToast(`${combos.length} parlays created`);
}
function setResult(id,result){
  S.betResults[id]=S.betResults[id]===result?null:result;
  saveState();render();
}
function parlayPayoutForArchive(p) {
  const status=parlayStatus(p);
  if(status==='win') return effectiveDecimal(p.betIds)*p.stake;
  if(status==='push') return p.stake;
  return parseFloat(calcPayout(p.betIds,p.stake));
}
function saveRecap(){
  const recap={
    id:uid(),event:S.weekName||S.eventName,
    date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    bets:S.bets.map(b=>({...b,result:S.betResults[b.id]||null})),
    parlays:S.parlays.map(p=>{
      const status=parlayStatus(p);
      return{...p,result:status,payout:parlayPayoutForArchive(p)};
    }),
  };
  S.weeklyRecaps=[recap,...S.weeklyRecaps];
  S.weekName=defaultWeekName(); // reset for next week
  saveState();showToast('Week archived ✓');render();
}
function deleteRecap(id){
  S.weeklyRecaps=S.weeklyRecaps.filter(r=>r.id!==id);
  saveState();render();
}
function newWeek(){
  S.bets=[];S.parlays=[];S.betResults={};S.activeParlayId=null;S._confirmClear=false;
  S.weekName='';
  saveState();render();showToast('New week started ✓');
}

// ─── PARLAY RENAME ──────────────────────────────────────────────────────────
function renameParlay(id) {
  renamingParlayId = id; renderScreen();
  setTimeout(() => { const el = document.getElementById('parlayNameInput'); if(el){el.focus();el.select();} }, 60);
}
function submitRenameParlay() {
  const val = document.getElementById('parlayNameInput')?.value?.trim();
  if (val && renamingParlayId) { S.parlays = S.parlays.map(p => p.id===renamingParlayId?{...p,name:val}:p); saveState(); }
  renamingParlayId = null; render();
}

// ─── SHARE PARLAY ───────────────────────────────────────────────────────────
async function shareParlay(pid) {
  const p = S.parlays.find(x => x.id === pid);
  if (!p || !p.betIds.length) { showToast('Add legs first'); return; }
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  const W = 720, rowH = 58, hdrH = 108, ftrH = 88;
  const H = hdrH + rowH * p.betIds.length + ftrH;
  const canvas = document.createElement('canvas');
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  // Background
  ctx.fillStyle = '#1A1916'; ctx.fillRect(0, 0, W, H);
  // Header
  ctx.fillStyle = '#C96442'; ctx.font = 'bold 30px Georgia,serif';
  ctx.fillText('parlay', 36, 46);
  ctx.fillStyle = '#FAF9F7'; ctx.font = 'bold 20px -apple-system,sans-serif';
  ctx.fillText(p.name, 36, 78);
  ctx.fillStyle = '#3D3B37'; ctx.fillRect(0, hdrH-1, W, 1);
  // Legs
  p.betIds.forEach((bid,i) => {
    const b = S.bets.find(x=>x.id===bid); if(!b) return;
    const y = hdrH + i * rowH;
    if (i%2===0) { ctx.fillStyle='#222120'; ctx.fillRect(0, y, W, rowH); }
    ctx.fillStyle='#FAF9F7'; ctx.font='600 17px -apple-system,sans-serif'; ctx.textAlign='left';
    ctx.fillText(b.name, 36, y+rowH/2+6);
    ctx.fillStyle = b.odds>0?'#2D7D52':'#C96442'; ctx.font='italic bold 19px Georgia,serif'; ctx.textAlign='right';
    ctx.fillText(fmtOdds(b.odds), W-36, y+rowH/2+6);
    ctx.fillStyle='#8A8680'; ctx.font='500 12px -apple-system,sans-serif';
    ctx.fillText(impliedProb(b.odds).toFixed(0)+'%', W-36, y+rowH/2+22);
  });
  // Footer
  const fy = hdrH + p.betIds.length * rowH;
  ctx.fillStyle='#111010'; ctx.fillRect(0, fy, W, ftrH);
  ctx.fillStyle='#8A8680'; ctx.font='500 14px -apple-system,sans-serif'; ctx.textAlign='left';
  ctx.fillText(`${p.betIds.length} legs · $${p.stake} stake`, 36, fy+32);
  ctx.fillStyle='#C96442'; ctx.font='italic bold 26px Georgia,serif'; ctx.textAlign='right';
  ctx.fillText(decToAmerican(parlayDecimal(p.betIds)), W-36, fy+32);
  ctx.fillStyle='#2D7D52'; ctx.font='bold 15px -apple-system,sans-serif';
  ctx.fillText('→ $'+calcPayout(p.betIds,p.stake)+' payout', W-36, fy+56);
  canvas.toBlob(async blob => {
    try {
      await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
      haptic(); showToast('Parlay card copied!');
    } catch(e) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='parlay.png'; a.click();
      showToast('Parlay card saved!');
    }
  }, 'image/png');
}

// ─── SWIPE TO DELETE ────────────────────────────────────────────────────────
function initSwipe() {
  document.querySelectorAll('.bet-card[data-id]').forEach(card => {
    let sx=0, sy=0, tracking=false, didSwipe=false;
    card.addEventListener('touchstart', e => {
      if (e.target.closest('.drag-handle')||e.target.closest('.icon-btn')) return;
      sx=e.touches[0].clientX; sy=e.touches[0].clientY; tracking=true; didSwipe=false;
    }, {passive:true});
    card.addEventListener('touchmove', e => {
      if (!tracking) return;
      const dx=e.touches[0].clientX-sx, dy=Math.abs(e.touches[0].clientY-sy);
      if (!didSwipe && dy>12 && dy>Math.abs(dx)) { tracking=false; return; }
      if (dx < -8) {
        didSwipe=true; e.preventDefault();
        const x=Math.max(dx,-100);
        card.style.transition='none';
        card.style.transform=`translateX(${x}px)`;
        card.style.borderRightColor=dx<-55?'var(--red)':'var(--border2)';
      }
    }, {passive:false});
    card.addEventListener('touchend', e => {
      if (!tracking||!didSwipe) { tracking=false; return; }
      tracking=false;
      const dx=e.changedTouches[0].clientX-sx;
      if (dx < -75) {
        card.style.transition='transform 0.18s ease,opacity 0.18s ease';
        card.style.transform='translateX(-110%)'; card.style.opacity='0';
        setTimeout(()=>deleteBet(card.dataset.id), 180);
      } else {
        card.style.transition='transform 0.2s ease';
        card.style.transform=''; card.style.borderRightColor='';
        setTimeout(()=>{ card.style.transition=''; }, 200);
      }
    }, {passive:true});
  });
}

// ─── ATTACH HANDLERS ───────────────────────────────────────────────────────
function attachHandlers(){
  initDrag(); initSwipe();
}

// ─── DRAG TO REORDER ────────────────────────────────────────────────────────
let _drag = null;

function initDrag() {
  document.querySelectorAll('.drag-handle').forEach(h => {
    h.addEventListener('touchstart', onDragStart, {passive: false});
    h.addEventListener('mousedown', onDragStart);
  });
}

function onDragStart(e) {
  const card = e.currentTarget.closest('.bet-card[data-id]');
  if (!card) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const rect = card.getBoundingClientRect();
  const ghost = card.cloneNode(true);
  ghost.style.cssText = `position:fixed;left:${rect.left}px;width:${rect.width}px;top:${rect.top}px;z-index:500;opacity:0.92;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,0.18);border-radius:14px;transition:none;`;
  document.body.appendChild(ghost);
  card.style.opacity = '0.25';
  _drag = { id: card.dataset.id, offsetY: touch.clientY - rect.top, ghost, card };
  document.addEventListener('touchmove', onDragMove, {passive: false});
  document.addEventListener('touchend', onDragEnd);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
}

function onDragMove(e) {
  if (!_drag) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const y = touch.clientY;
  _drag.ghost.style.top = (y - _drag.offsetY) + 'px';
  document.querySelectorAll('.bet-card[data-id]').forEach(c => {
    c.classList.remove('drag-over-top', 'drag-over-bottom');
    if (c.dataset.id === _drag.id) return;
    const r = c.getBoundingClientRect();
    c.classList.add(y < r.top + r.height / 2 ? 'drag-over-top' : 'drag-over-bottom');
  });
}

function onDragEnd(e) {
  if (!_drag) return;
  const touch = e.changedTouches ? e.changedTouches[0] : e;
  const y = touch.clientY;
  const cards = [...document.querySelectorAll('.bet-card[data-id]')];
  let targetId = null, insertBefore = true;
  for (const c of cards) {
    if (c.dataset.id === _drag.id) continue;
    const r = c.getBoundingClientRect();
    if (y < r.top + r.height / 2) { targetId = c.dataset.id; insertBefore = true; break; }
    targetId = c.dataset.id; insertBefore = false;
  }
  const fromIdx = S.bets.findIndex(b => b.id === _drag.id);
  if (targetId !== null) {
    let toIdx = S.bets.findIndex(b => b.id === targetId);
    if (!insertBefore) toIdx++;
    if (fromIdx < toIdx) toIdx--;
    if (fromIdx !== toIdx && toIdx >= 0) {
      const [moved] = S.bets.splice(fromIdx, 1);
      S.bets.splice(toIdx, 0, moved);
      saveState();
    }
  }
  _drag.ghost.remove();
  _drag.card.style.opacity = '';
  cards.forEach(c => c.classList.remove('drag-over-top', 'drag-over-bottom'));
  _drag = null;
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  haptic([4,30,4]);
  render();
}

// ─── SERVICE WORKER ────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  const swCode=`const CACHE='parlay-v7';
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/'])));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{if(e.request.url.includes('fonts.googleapis')||e.request.url.includes('fonts.gstatic'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>r)));});`;
  const swBlob=new Blob([swCode],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob));
}

// ─── BOOT ──────────────────────────────────────────────────────────────────
loadState();render();
// Try loading from GitHub (async — will re-render when done)
if (getToken()) {
  ghLoad().then(ok => { if (ok) render(); });
}
</script>
